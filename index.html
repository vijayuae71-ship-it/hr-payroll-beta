    // sql.js Database Shim
    // ═══════════════════════════════════════════
    let _db = null;
    const DB_KEY = 'hr_payroll_beta_db';

    let _saveTimer = null;
    function _scheduleDbSave() {
      if (_saveTimer) clearTimeout(_saveTimer);
      _saveTimer = setTimeout(() => {
        try {
          const data = _db.export();
          const bytes = new Uint8Array(data);
          const chunks = [];
          const CHUNK = 8192;
          for (let i = 0; i < bytes.length; i += CHUNK) {
            chunks.push(String.fromCharCode.apply(null, bytes.subarray(i, i + CHUNK)));
          }
          localStorage.setItem(DB_KEY, btoa(chunks.join('')));
        } catch(e) { console.warn('DB save failed:', e); }
      }, 200);
    }

    window.tasklet = {
      sqlQuery: function(query) {
        return new Promise((resolve, reject) => {
          try {
            const results = _db.exec(query);
            if (!results.length) { resolve([]); return; }
            const { columns, values } = results[0];
            resolve(values.map(row => {
              const obj = {};
              columns.forEach((col, i) => obj[col] = row[i]);
              return obj;
            }));
          } catch(e) { console.error('SQL Query Error:', query, e); reject(e); }
        });
      },
      sqlExec: function(query) {
        return new Promise((resolve, reject) => {
          try {
            _db.run(query);
            _scheduleDbSave();
            resolve();
          } catch(e) { console.error('SQL Exec Error:', query, e); reject(e); }
        });
      }
    };

    async function _initSqlJs() {
      const SQL = await initSqlJs({
        locateFile: file => 'https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/' + file
      });
      const saved = localStorage.getItem(DB_KEY);
      if (saved) {
        try {
          const binary = atob(saved);
          const bytes = new Uint8Array(binary.length);
          for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
          _db = new SQL.Database(bytes);
          return;
        } catch(e) { console.warn('Fresh DB:', e); }
      }
      _db = new SQL.Database();
    }

  <script type="text/babel" data-presets="typescript,react">
    const { useState, useEffect, useRef, useCallback, useMemo, Fragment } = React;

// ── Helper utilities ──

const AVATAR_COLORS = [
  'bg-primary', 'bg-secondary', 'bg-accent', 'bg-info', 'bg-success', 'bg-warning', 'bg-error',
];

function randomAvatarColor(): string {
  return AVATAR_COLORS[Math.floor(Math.random() * AVATAR_COLORS.length)];
}

function getInitials(first: string, last: string): string {
  return `${(first?.[0] || '').toUpperCase()}${(last?.[0] || '').toUpperCase()}`;
}

// ── Multi-currency support (AED, USD, INR) ──
type SupportedCurrency = 'AED' | 'USD' | 'INR';

const CURRENCY_CONFIG: Record<SupportedCurrency, { locale: string; symbol: string }> = {
  AED: { locale: 'en-AE', symbol: 'AED' },
  USD: { locale: 'en-US', symbol: 'USD' },
  INR: { locale: 'en-IN', symbol: 'INR' },
};

let _activeCurrency: SupportedCurrency = 'AED';

function setActiveCurrency(c: SupportedCurrency) { _activeCurrency = c; }
function getActiveCurrency(): SupportedCurrency { return _activeCurrency; }

function formatCurrency(amount: number, currency?: SupportedCurrency): string {
  const c = currency || _activeCurrency;
  const cfg = CURRENCY_CONFIG[c] || CURRENCY_CONFIG.AED;
  return new Intl.NumberFormat(cfg.locale, { style: 'currency', currency: c }).format(amount);
}

function getCurrencySymbol(currency?: SupportedCurrency): string {
  const c = currency || _activeCurrency;
  return new Intl.NumberFormat('en', { style: 'currency', currency: c }).formatToParts(0)
    .find(p => p.type === 'currency')?.value || c;
}

function formatDate(dateStr: string): string {
  if (!dateStr) return '—';
  return new Date(dateStr).toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
}

function today(): string {
  return new Date().toISOString().slice(0, 10);
}

function currentMonth(): string {
  return new Date().toISOString().slice(0, 7);
}

function escapeSql(str: string): string {
  return String(str).split("'").join("''");
}

async function logAudit(userId: number, action: string, entityType: string, entityId: number, details: string): Promise<void> {
  await window.tasklet.sqlExec(
    `INSERT INTO hr_audit_log (user_id, action, entity_type, entity_id, details) VALUES (${userId}, '${escapeSql(action)}', '${escapeSql(entityType)}', ${entityId}, '${escapeSql(details)}')`
  );
}

function exportCSV(headers: string[], rows: string[][], filename: string): void {
  const csvContent = [
    headers.join(','),
    ...rows.map(row => row.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(','))
  ].join('\n');
  const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = filename;
  link.click();
  URL.revokeObjectURL(link.href);
}

function getRoleLabel(role: string): string {
  const labels: Record<string, string> = { admin: 'Administrator', hr_manager: 'HR Manager', manager: 'Manager', employee: 'Employee' };
  return labels[role] || role;
}

function getRoleBadgeClass(role: string): string {
  const classes: Record<string, string> = { admin: 'badge-primary', hr_manager: 'badge-secondary', manager: 'badge-info', employee: 'badge-ghost' };
  return classes[role] || 'badge-ghost';
}

// ── Database initialization & seed data ──

async function exec(sql: string): Promise<void> {
  await window.tasklet.sqlExec(sql);
}

async function query(sql: string): Promise<Record<string, unknown>[]> {
  return await window.tasklet.sqlQuery(sql) as Record<string, unknown>[];
}

async function initDatabase(): Promise<void> {
  // Quick version check — skip all CREATE/seed if already initialized
  try {
    const ver = await query("SELECT value FROM hr_company_settings WHERE key = '_schema_version'") as { value: string }[];
    if (ver.length > 0 && ver[0].value === '4') return; // Already fully initialized
  } catch (_) { /* table doesn't exist yet, proceed with full init */ }

  // Create tables one at a time (sqlExec supports only single statements)
  await exec(`CREATE TABLE IF NOT EXISTS hr_departments (
    id INTEGER PRIMARY KEY AUTOINCREMENT, name TEXT NOT NULL,
    head_name TEXT NOT NULL DEFAULT '', budget REAL NOT NULL DEFAULT 0,
    created_at TEXT NOT NULL DEFAULT (datetime('now')))`);

  await exec(`CREATE TABLE IF NOT EXISTS hr_employees (
    id INTEGER PRIMARY KEY AUTOINCREMENT, first_name TEXT NOT NULL, last_name TEXT NOT NULL,
    email TEXT NOT NULL, phone TEXT NOT NULL DEFAULT '', department_id INTEGER NOT NULL,
    designation TEXT NOT NULL DEFAULT '', date_of_joining TEXT NOT NULL,
    salary REAL NOT NULL DEFAULT 0, status TEXT NOT NULL DEFAULT 'active',
    avatar_color TEXT NOT NULL DEFAULT 'bg-primary',
    created_at TEXT NOT NULL DEFAULT (datetime('now')),
    FOREIGN KEY (department_id) REFERENCES hr_departments(id))`);

  await exec(`CREATE TABLE IF NOT EXISTS hr_payroll (
    id INTEGER PRIMARY KEY AUTOINCREMENT, employee_id INTEGER NOT NULL,
    month TEXT NOT NULL, basic_salary REAL NOT NULL DEFAULT 0,
    allowances REAL NOT NULL DEFAULT 0, deductions REAL NOT NULL DEFAULT 0,
    net_salary REAL NOT NULL DEFAULT 0, status TEXT NOT NULL DEFAULT 'pending',
    created_at TEXT NOT NULL DEFAULT (datetime('now')),
    FOREIGN KEY (employee_id) REFERENCES hr_employees(id))`);

  await exec(`CREATE TABLE IF NOT EXISTS hr_attendance (
    id INTEGER PRIMARY KEY AUTOINCREMENT, employee_id INTEGER NOT NULL,
    date TEXT NOT NULL, check_in TEXT NOT NULL DEFAULT '',
    check_out TEXT NOT NULL DEFAULT '', status TEXT NOT NULL DEFAULT 'present',
    FOREIGN KEY (employee_id) REFERENCES hr_employees(id))`);

  await exec(`CREATE TABLE IF NOT EXISTS hr_leaves (
    id INTEGER PRIMARY KEY AUTOINCREMENT, employee_id INTEGER NOT NULL,
    leave_type TEXT NOT NULL DEFAULT 'annual', start_date TEXT NOT NULL,
    end_date TEXT NOT NULL, days INTEGER NOT NULL DEFAULT 1,
    reason TEXT NOT NULL DEFAULT '', status TEXT NOT NULL DEFAULT 'pending',
    created_at TEXT NOT NULL DEFAULT (datetime('now')),
    FOREIGN KEY (employee_id) REFERENCES hr_employees(id))`);

  await exec(`CREATE TABLE IF NOT EXISTS hr_training_programs (
    id INTEGER PRIMARY KEY AUTOINCREMENT, title TEXT NOT NULL,
    description TEXT NOT NULL DEFAULT '', trainer TEXT NOT NULL DEFAULT '',
    department_id INTEGER, start_date TEXT NOT NULL, end_date TEXT NOT NULL,
    max_participants INTEGER NOT NULL DEFAULT 20,
    status TEXT NOT NULL DEFAULT 'upcoming', category TEXT NOT NULL DEFAULT 'technical',
    created_at TEXT NOT NULL DEFAULT (datetime('now')))`);

  await exec(`CREATE TABLE IF NOT EXISTS hr_training_enrollments (
    id INTEGER PRIMARY KEY AUTOINCREMENT, program_id INTEGER NOT NULL,
    employee_id INTEGER NOT NULL, status TEXT NOT NULL DEFAULT 'enrolled',
    completion_date TEXT NOT NULL DEFAULT '', score REAL NOT NULL DEFAULT 0,
    FOREIGN KEY (program_id) REFERENCES hr_training_programs(id),
    FOREIGN KEY (employee_id) REFERENCES hr_employees(id))`);

  await exec(`CREATE TABLE IF NOT EXISTS hr_job_openings (
    id INTEGER PRIMARY KEY AUTOINCREMENT, title TEXT NOT NULL,
    department_id INTEGER NOT NULL, description TEXT NOT NULL DEFAULT '',
    requirements TEXT NOT NULL DEFAULT '', salary_min REAL NOT NULL DEFAULT 0,
    salary_max REAL NOT NULL DEFAULT 0, employment_type TEXT NOT NULL DEFAULT 'full_time',
    status TEXT NOT NULL DEFAULT 'open', posted_date TEXT NOT NULL,
    closing_date TEXT NOT NULL DEFAULT '',
    created_at TEXT NOT NULL DEFAULT (datetime('now')),
    FOREIGN KEY (department_id) REFERENCES hr_departments(id))`);

  await exec(`CREATE TABLE IF NOT EXISTS hr_candidates (
    id INTEGER PRIMARY KEY AUTOINCREMENT, job_id INTEGER NOT NULL,
    first_name TEXT NOT NULL, last_name TEXT NOT NULL, email TEXT NOT NULL,
    phone TEXT NOT NULL DEFAULT '', experience_years REAL NOT NULL DEFAULT 0,
    status TEXT NOT NULL DEFAULT 'applied', notes TEXT NOT NULL DEFAULT '',
    applied_date TEXT NOT NULL, created_at TEXT NOT NULL DEFAULT (datetime('now')),
    FOREIGN KEY (job_id) REFERENCES hr_job_openings(id))`);

  await exec(`CREATE TABLE IF NOT EXISTS hr_appraisal_cycles (
    id INTEGER PRIMARY KEY AUTOINCREMENT, name TEXT NOT NULL,
    cycle_type TEXT NOT NULL DEFAULT 'annual', start_date TEXT NOT NULL,
    end_date TEXT NOT NULL, status TEXT NOT NULL DEFAULT 'draft',
    created_at TEXT NOT NULL DEFAULT (datetime('now')))`);

  await exec(`CREATE TABLE IF NOT EXISTS hr_appraisals (

    const { sqlQuery } = window.tasklet;

    ]);
    setUsers(userRows as unknown as UserOption[]);
    if (settings.length > 0) setCompanyName(String((settings[0] as Record<string, unknown>).value));
  }

  async function handleLogin(e: React.FormEvent) {
    e.preventDefault();
    if (!selectedUser) { setError('Please select a user'); return; }
    if (!password) { setError('Please enter password'); return; }
    setLoading(true);
    setError('');
    try {

      const rows = await sqlQuery(

      );
      if (rows.length === 0) {
        setError('Invalid credentials. Default password is 1234');
        setLoading(false);
        return;
      }
      const user = rows[0] as unknown as AppUser;
      await sqlExec(`UPDATE hr_users SET last_login = datetime('now') WHERE id = ${user.id}`);
      await sqlExec(`INSERT INTO hr_audit_log (user_id, action, entity_type, entity_id, details) VALUES (${user.id}, 'login', 'system', 0, '${user.display_name} logged in as ${user.role}')`);

          <form onSubmit={handleLogin} className="space-y-4">

            <div>

              <select

                value={selectedUser}
                onChange={(e) => { setSelectedUser(e.target.value); setError(''); }}
              >
                <option value="">Choose account...</option>
                {roleGroups.map(group => {

            {/* Password */}

                <input

interface SignupProps {
  onBack: () => void;
  onSignupComplete: (data: SignupData) => void;
}

const PLANS: { tier: PlanTier; name: string; price: string; employees: string; icon: React.ReactNode; features: string[]; highlight?: boolean }[] = [
  { tier: 'free', name: 'Free', price: 'Free forever', employees: 'Up to 10', icon: <Zap size={20} />, features: ['Basic HR modules', 'Employee directory', 'Leave management', 'Email support'] },
  { tier: 'starter', name: 'Starter', price: 'From $29/mo', employees: 'Up to 25', icon: <Star size={20} />, features: ['Everything in Free', 'Payroll processing', 'Attendance tracking', 'Basic reports'] },
  { tier: 'professional', name: 'Professional', price: 'From $79/mo', employees: 'Up to 50', icon: <Crown size={20} />, features: ['Everything in Starter', 'Training & Development', 'Talent Acquisition', 'Advanced analytics'], highlight: true },
  { tier: 'enterprise', name: 'Enterprise', price: 'From $199/mo', employees: 'Up to 100', icon: <Rocket size={20} />, features: ['Everything in Pro', 'Appraisal system', 'Custom workflows', 'Priority support'] },
];

const planLimits: Record<PlanTier, number> = { free: 10, starter: 25, professional: 50, enterprise: 100 };

const Signup: React.FC<SignupProps> = ({ onBack, onSignupComplete }) => {
  const [step, setStep] = useState<'plan' | 'details'>('plan');
  const [selectedPlan, setSelectedPlan] = useState<PlanTier>('free');
  const [form, setForm] = useState({ company_name: '', admin_name: '', admin_email: '', password: '', confirm_password: '' });
  const [showPassword, setShowPassword] = useState(false);
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);

  function handlePlanSelect(tier: PlanTier) {
    setSelectedPlan(tier);
    setStep('details');
  }

  async function handleSubmit(e: React.FormEvent) {
    e.preventDefault();
    setError('');
    if (!form.company_name.trim()) { setError('Company name is required'); return; }
    if (!form.admin_name.trim()) { setError('Your name is required'); return; }
    if (!form.admin_email.trim()) { setError('Email is required'); return; }
    if (!form.password || form.password.length < 4) { setError('Password must be at least 4 characters'); return; }
    if (form.password !== form.confirm_password) { setError('Passwords do not match'); return; }

    setLoading(true);
    try {
      const { sqlExec, sqlQuery } = window.tasklet;

      // Check if email already exists
      const existing = await sqlQuery(`SELECT id FROM hr_tenants WHERE admin_email = '${escapeSql(form.admin_email)}'`);
      if (existing.length > 0) { setError('An account with this email already exists'); setLoading(false); return; }

      const limit = planLimits[selectedPlan];

      // Create the tenant
      await sqlExec(`INSERT INTO hr_tenants (name, domain, plan, status, employee_limit, admin_name, admin_email) VALUES ('${escapeSql(form.company_name)}', '${escapeSql(form.admin_email.split('@')[1] || '')}', '${selectedPlan}', '${selectedPlan === 'free' ? 'trial' : 'active'}', ${limit}, '${escapeSql(form.admin_name)}', '${escapeSql(form.admin_email)}')`);

      const tenantRows = await sqlQuery(`SELECT id FROM hr_tenants WHERE admin_email = '${escapeSql(form.admin_email)}'`) as { id: number }[];
      const tenantId = tenantRows[0].id;

      // Create subscription
      const today = new Date().toISOString().slice(0, 10);
      const endDate = new Date();
      endDate.setMonth(endDate.getMonth() + (selectedPlan === 'free' ? 1 : 12));
      const endStr = endDate.toISOString().slice(0, 10);
      await sqlExec(`INSERT INTO hr_subscriptions (tenant_id, plan, status, billing_cycle, amount, currency, current_period_start, current_period_end) VALUES (${tenantId}, '${selectedPlan}', '${selectedPlan === 'free' ? 'trialing' : 'active'}', 'monthly', 0, 'USD', '${today}', '${endStr}')`);

      // Create admin employee record
      const nameParts = form.admin_name.trim().split(' ');
      const firstName = nameParts[0] || 'Admin';
      const lastName = nameParts.slice(1).join(' ') || 'User';
      await sqlExec(`INSERT INTO hr_employees (first_name, last_name, email, phone, department_id, designation, date_of_joining, salary, status, avatar_color) VALUES ('${escapeSql(firstName)}', '${escapeSql(lastName)}', '${escapeSql(form.admin_email)}', '', 0, 'Administrator', '${today}', 0, 'active', 'bg-primary')`);

      const empRows = await sqlQuery(`SELECT id FROM hr_employees WHERE email = '${escapeSql(form.admin_email)}'`) as { id: number }[];
      const empId = empRows[0].id;

      // Create admin user account
      const username = form.admin_email.split('@')[0].toLowerCase().replace(/[^a-z0-9._]/g, '');
      await sqlExec(`INSERT INTO hr_users (employee_id, username, password, role, display_name) VALUES (${empId}, '${escapeSql(username)}', '${escapeSql(form.password)}', 'admin', '${escapeSql(form.admin_name)}')`);

      const userRows = await sqlQuery(`SELECT id FROM hr_users WHERE employee_id = ${empId}`) as { id: number }[];
      const userId = userRows[0].id;

      // Audit log
      await sqlExec(`INSERT INTO hr_audit_log (user_id, action, entity_type, entity_id, details) VALUES (${userId}, 'tenant_signup', 'tenant', ${tenantId}, 'New tenant registered: ${escapeSql(form.company_name)} (${selectedPlan} plan)')`);

      onSignupComplete({
        company_name: form.company_name,
        admin_name: form.admin_name,
        admin_email: form.admin_email,
        password: form.password,
        plan: selectedPlan,
        tenant_id: tenantId,
        user_id: userId,
        employee_id: empId,
      });
    } catch (err) {
      setError('Something went wrong. Please try again.');
      console.error(err);
    }
    setLoading(false);
  }

  return (
    <div className="min-h-screen bg-base-100 overflow-y-auto">
      {/* Header */}
      <div className="sticky top-0 z-10 bg-base-100/95 backdrop-blur border-b border-base-300">
        <div className="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between">
          <div className="flex items-center gap-3">
            <div className="w-8 h-8 rounded-lg bg-primary flex items-center justify-center">
              <Shield size={16} className="text-primary-content" />
            </div>
            <span className="font-bold text-sm">HR & Payroll</span>
          </div>
          <button className="btn btn-ghost btn-sm gap-1.5" onClick={onBack}>
            <ArrowLeft size={15} /> Back to Login
          </button>
        </div>
      </div>

      <div className="max-w-5xl mx-auto px-4 py-6 md:py-10">
        {step === 'plan' ? (
          <>
            {/* Plan Selection */}
            <div className="text-center mb-8">
              <h1 className="text-2xl md:text-3xl font-bold mb-2">Start your HR journey</h1>
              <p className="text-sm text-base-content/50 max-w-md mx-auto">Choose a plan that fits your organization. You can upgrade anytime as your team grows.</p>
            </div>

            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
              {PLANS.map(plan => (
                <div
                  key={plan.tier}
                  className={`pro-card p-5 cursor-pointer relative flex flex-col ${plan.highlight ? 'ring-2 ring-primary border-primary' : ''}`}
                  onClick={() => handlePlanSelect(plan.tier)}
                >
                  {plan.highlight && (
                    <div className="absolute -top-3 left-1/2 -translate-x-1/2 badge badge-primary badge-sm">Most Popular</div>
                  )}
                  <div className={`w-10 h-10 rounded-lg flex items-center justify-center mb-3 ${plan.highlight ? 'bg-primary text-primary-content' : 'bg-base-100 text-primary'}`}>
                    {plan.icon}
                  </div>
                  <h3 className="font-bold text-base">{plan.name}</h3>
                  <p className="text-sm font-semibold text-primary mt-1">{plan.price}</p>
                  <p className="text-xs text-base-content/50 mt-0.5 mb-4">{plan.employees} employees</p>
                  <ul className="space-y-2 flex-1">
                    {plan.features.map((f, i) => (
                      <li key={i} className="flex items-start gap-2 text-xs text-base-content/70">
                        <Check size={13} className="text-success mt-0.5 shrink-0" />
                        {f}
                      </li>
                    ))}
                  </ul>
                  <button className={`btn btn-sm w-full mt-4 ${plan.highlight ? 'btn-primary' : 'btn-outline btn-primary'}`}>
                    {plan.tier === 'free' ? 'Start Free' : 'Select Plan'}
                  </button>
                </div>
              ))}
            </div>

            <p className="text-center text-xs text-base-content/30 mt-6">All plans include a 14-day free trial. No credit card required.</p>
          </>
        ) : (
          <>
            {/* Account Details Form */}
            <div className="max-w-md mx-auto">
              <button className="btn btn-ghost btn-sm gap-1 mb-6 -ml-2" onClick={() => setStep('plan')}>
                <ArrowLeft size={14} /> Change plan
              </button>

              <div className="text-center mb-6">
                <div className="inline-flex items-center gap-2 bg-primary/10 text-primary text-xs font-semibold px-3 py-1.5 rounded-full mb-3">
                  <Crown size={13} />
                  {PLANS.find(p => p.tier === selectedPlan)?.name} Plan
                </div>
                <h2 className="text-xl font-bold">Create your account</h2>
                <p className="text-sm text-base-content/50 mt-1">Set up your organization in seconds</p>
              </div>

              <form onSubmit={handleSubmit} className="pro-card p-6 space-y-4">
                <div>
                  <label className="label"><span className="label-text text-xs font-medium">Company / Organization Name *</span></label>
                  <label className="input input-bordered flex items-center gap-2">
                    <Building2 size={15} className="text-base-content/40" />
                    <input className="grow" placeholder="Acme Corp" value={form.company_name} onChange={e => setForm({...form, company_name: e.target.value})} />
                  </label>
                </div>

                <div>
                  <label className="label"><span className="label-text text-xs font-medium">Your Full Name *</span></label>
                  <label className="input input-bordered flex items-center gap-2">
                    <User size={15} className="text-base-content/40" />
                    <input className="grow" placeholder="John Doe" value={form.admin_name} onChange={e => setForm({...form, admin_name: e.target.value})} />
                  </label>
                </div>

                <div>
                  <label className="label"><span className="label-text text-xs font-medium">Work Email *</span></label>
                  <label className="input input-bordered flex items-center gap-2">
                    <Mail size={15} className="text-base-content/40" />
                    <input type="email" className="grow" placeholder="john@acme.com" value={form.admin_email} onChange={e => setForm({...form, admin_email: e.target.value})} />
                  </label>
                </div>

                <div>
                  <label className="label"><span className="label-text text-xs font-medium">Password *</span></label>
                  <label className="input input-bordered flex items-center gap-2">
                    <Lock size={15} className="text-base-content/40" />
                    <input type={showPassword ? 'text' : 'password'} className="grow" placeholder="Min. 4 characters" value={form.password} onChange={e => setForm({...form, password: e.target.value})} />
                    <button type="button" className="btn btn-ghost btn-xs btn-square" onClick={() => setShowPassword(!showPassword)}>
                      {showPassword ? <EyeOff size={14} /> : <Eye size={14} />}

                <div>

                {error && (
                  <div className="alert alert-error py-2 text-sm"><span>{error}</span></div>

                <button type="submit" className={`btn btn-primary w-full ${loading ? 'loading' : ''}`} disabled={loading}>

                <p className="text-[11px] text-center text-base-content/30">

// ════════════════════ OnboardingWizard.tsx ════════════════════

interface OnboardingWizardProps {
  signupData: SignupData;
  onComplete: (user: AppUser) => void;
}

interface DeptRow { name: string; head: string; budget: string; }
interface EmpRow { first_name: string; last_name: string; email: string; designation: string; salary: string; department: string; }

const STEPS = [
  { icon: <Building2 size={16} />, label: 'Company Profile' },
  { icon: <Briefcase size={16} />, label: 'Departments' },
  { icon: <Users size={16} />, label: 'Employees' },
  { icon: <Wallet size={16} />, label: 'Payroll Setup' },
  { icon: <Rocket size={16} />, label: 'Launch' },
];

const INDUSTRIES = ['Technology', 'Finance & Banking', 'Healthcare', 'Education', 'Retail & E-commerce', 'Manufacturing', 'Real Estate', 'Consulting', 'Hospitality', 'Logistics', 'Other'];

const CURRENCIES: { code: SupportedCurrency; flag: string; name: string }[] = [
  { code: 'AED', flag: '🇦🇪', name: 'UAE Dirham' },
  { code: 'USD', flag: '🇺🇸', name: 'US Dollar' },
  { code: 'INR', flag: '🇮🇳', name: 'Indian Rupee' },
];

const planLimits: Record<PlanTier, number> = { free: 10, starter: 25, professional: 50, enterprise: 100 };

const OnboardingWizard: React.FC<OnboardingWizardProps> = ({ signupData, onComplete }) => {
  const [currentStep, setCurrentStep] = useState(0);
  const [loading, setLoading] = useState(false);

  // Step 1: Company Profile
  const [industry, setIndustry] = useState('Technology');
  const [companySize, setCompanySize] = useState('10-25');
  const [currency, setCurrency] = useState<SupportedCurrency>('USD');
  const [timezone, setTimezone] = useState('Asia/Dubai');
  const [tagline, setTagline] = useState('');

  // Step 2: Departments
  const [departments, setDepartments] = useState<DeptRow[]>([
    { name: 'Human Resources', head: '', budget: '0' },
    { name: 'Engineering', head: '', budget: '0' },
    { name: 'Marketing', head: '', budget: '0' },
  ]);

  // Step 3: Employees
  const [employees, setEmployees] = useState<EmpRow[]>([]);

  // Step 4: Payroll
  const [payCycle, setPayCycle] = useState('monthly');
  const [workStart, setWorkStart] = useState('09:00');
  const [workEnd, setWorkEnd] = useState('18:00');
  const [annualLeave, setAnnualLeave] = useState('30');
  const [sickLeave, setSickLeave] = useState('15');
  const [probationMonths, setProbationMonths] = useState('3');

  function addDepartment() {
    setDepartments([...departments, { name: '', head: '', budget: '0' }]);
  }

  function removeDepartment(i: number) {
    setDepartments(departments.filter((_, idx) => idx !== i));
  }

  function updateDept(i: number, field: keyof DeptRow, val: string) {
    const updated = [...departments];
    updated[i] = { ...updated[i], [field]: val };
    setDepartments(updated);
  }

  function addEmployee() {
    setEmployees([...employees, { first_name: '', last_name: '', email: '', designation: '', salary: '0', department: departments[0]?.name || '' }]);
  }

  function removeEmployee(i: number) {
    setEmployees(employees.filter((_, idx) => idx !== i));
  }

  function updateEmp(i: number, field: keyof EmpRow, val: string) {
    const updated = [...employees];
    updated[i] = { ...updated[i], [field]: val };
    setEmployees(updated);
  }

  function canProceed(): boolean {
    if (currentStep === 0) return true;
    if (currentStep === 1) return departments.filter(d => d.name.trim()).length > 0;
    if (currentStep === 2) return true; // employees are optional
    if (currentStep === 3) return true;
    return true;
  }

  async function handleFinish() {
    setLoading(true);
    try {
      const { sqlExec, sqlQuery } = window.tasklet;
      const today = new Date().toISOString().slice(0, 10);

      // Save company settings
      const settings: [string, string][] = [
        ['company_name', signupData.company_name],
        ['company_tagline', tagline || 'Welcome to ' + signupData.company_name],
        ['industry', industry],
        ['company_size', companySize],
        ['currency', currency],
        ['timezone', timezone],
        ['fiscal_year_start', '01'],
        ['work_hours_start', workStart],
        ['work_hours_end', workEnd],
        ['annual_leave_quota', annualLeave],
        ['sick_leave_quota', sickLeave],
        ['probation_months', probationMonths],
        ['pay_cycle', payCycle],
        ['onboarding_complete', 'true'],
      ];

      for (const [key, val] of settings) {
        await sqlExec(`INSERT OR REPLACE INTO hr_company_settings (key, value) VALUES ('${escapeSql(key)}', '${escapeSql(val)}')`);
      }

      // Set active currency globally
      setActiveCurrency(currency);

      // Create departments
      const validDepts = departments.filter(d => d.name.trim());
      const deptNameToId: Record<string, number> = {};

      for (const d of validDepts) {
        await sqlExec(`INSERT INTO hr_departments (name, head_name, budget) VALUES ('${escapeSql(d.name)}', '${escapeSql(d.head)}', ${parseFloat(d.budget) || 0})`);
        const rows = await sqlQuery(`SELECT id FROM hr_departments WHERE name = '${escapeSql(d.name)}' ORDER BY id DESC LIMIT 1`) as { id: number }[];
        if (rows.length > 0) deptNameToId[d.name] = rows[0].id;
      }

      // Update admin employee with a department
      const firstDeptId = Object.values(deptNameToId)[0] || 0;
      if (signupData.employee_id && firstDeptId) {
        await sqlExec(`UPDATE hr_employees SET department_id = ${firstDeptId} WHERE id = ${signupData.employee_id}`);
      }

      // Create employees
      const validEmps = employees.filter(e => e.first_name.trim() && e.last_name.trim());
      const colors = ['bg-primary', 'bg-secondary', 'bg-accent', 'bg-info', 'bg-success', 'bg-warning', 'bg-error'];

      for (let i = 0; i < validEmps.length; i++) {
        const e = validEmps[i];
        const deptId = deptNameToId[e.department] || firstDeptId || 0;
        const color = colors[i % colors.length];
        await sqlExec(`INSERT INTO hr_employees (first_name, last_name, email, phone, department_id, designation, date_of_joining, salary, status, avatar_color) VALUES ('${escapeSql(e.first_name)}', '${escapeSql(e.last_name)}', '${escapeSql(e.email)}', '', ${deptId}, '${escapeSql(e.designation)}', '${today}', ${parseFloat(e.salary) || 0}, 'active', '${color}')`);

        // Create user account for employee
        if (e.email) {
          const empRows = await sqlQuery(`SELECT id FROM hr_employees WHERE email = '${escapeSql(e.email)}' ORDER BY id DESC LIMIT 1`) as { id: number }[];
          if (empRows.length > 0) {
            const uname = e.email.split('@')[0].toLowerCase().replace(/[^a-z0-9._]/g, '');
            await sqlExec(`INSERT OR IGNORE INTO hr_users (employee_id, username, password, role, display_name) VALUES (${empRows[0].id}, '${escapeSql(uname)}', '1234', 'employee', '${escapeSql(e.first_name + ' ' + e.last_name)}')`);
          }
        }
      }

      // Generate payroll for new employees
      const month = new Date().toISOString().slice(0, 7);
      await sqlExec(`INSERT INTO hr_payroll (employee_id, month, basic_salary, allowances, deductions, net_salary, status)
        SELECT id, '${month}', salary, salary * 0.15, salary * 0.05, salary + salary * 0.15 - salary * 0.05, 'pending'
        FROM hr_employees WHERE salary > 0 AND id NOT IN (SELECT employee_id FROM hr_payroll WHERE month = '${month}')`);

      // Audit log
      await sqlExec(`INSERT INTO hr_audit_log (user_id, action, entity_type, entity_id, details) VALUES (${signupData.user_id || 0}, 'onboarding_complete', 'tenant', ${signupData.tenant_id || 0}, 'Onboarding completed: ${validDepts.length} departments, ${validEmps.length} employees added')`);

      // Update schema version
      await sqlExec(`INSERT OR REPLACE INTO hr_company_settings (key, value) VALUES ('_schema_version', '3')`);

      // Get the full user object for login
      const userRows = await sqlQuery(`SELECT u.*, e.first_name || ' ' || e.last_name as display_name FROM hr_users u JOIN hr_employees e ON u.employee_id = e.id WHERE u.id = ${signupData.user_id}`) as unknown as AppUser[];

      if (userRows.length > 0) {
        onComplete(userRows[0]);
      }
    } catch (err) {
      console.error('Onboarding error:', err);
    }
    setLoading(false);
  }

  function handleNext() {
    if (currentStep < 4) setCurrentStep(currentStep + 1);
    else handleFinish();
  }

  function handleBack() {
    if (currentStep > 0) setCurrentStep(currentStep - 1);
  }

      {/* Bottom Navigation */}
      <div className="sticky bottom-0 bg-base-100/95 backdrop-blur border-t border-base-300">
        <div className="max-w-4xl mx-auto px-4 py-3 flex items-center justify-between">
          <button
            className="btn btn-ghost btn-sm gap-1.5"
            onClick={handleBack}

          <div className="text-xs text-base-content/40">

          <button

            </div>
            <div>
              <h1 className="font-bold text-sm leading-tight">HR & Payroll</h1>
              <p className="text-[10px] text-base-content/40 font-medium uppercase tracking-wider">SaaS Platform</p>
            </div>
          </div>
          <button className="btn btn-ghost btn-xs btn-square lg:hidden" onClick={onClose}>
            <X size={16} />
          </button>
        </div>
      </div>

      {/* Navigation */}
      <nav className="flex-1 overflow-y-auto px-3 py-3 space-y-1">
        {visibleSections.map((section, si) => (
          <div key={si} className={si > 0 ? 'mt-4' : ''}>
            {section.title && (
              <p className="text-[10px] font-semibold uppercase tracking-widest text-base-content/35 px-3 mb-1.5">{section.title}</p>
            )}
            {section.items.map((item) => (
              <button
                key={item.page}
                className={`sidebar-nav-item ${currentPage === item.page ? 'active' : ''}`}
                onClick={() => onNavigate(item.page)}
              >
                {item.icon}
                {item.label}
              </button>
            ))}
          </div>
        ))}
      </nav>

      {/* User footer */}
      <div className="p-3 border-t border-base-300">
        <div className="flex items-center gap-2 px-2">
          <div className="w-8 h-8 rounded-full bg-primary/15 flex items-center justify-center">
            <span className="text-xs font-bold text-primary">{currentUser.display_name.split(' ').map(n => n[0]).join('')}</span>
          </div>
          <div className="min-w-0 flex-1">
            <p className="text-xs font-medium truncate">{currentUser.display_name}</p>
            <span className={`badge badge-xs ${getRoleBadgeClass(currentUser.role)}`}>
              {getRoleLabel(currentUser.role)}
            </span>
          </div>
          <button className="btn btn-ghost btn-xs btn-square opacity-50 hover:opacity-100" onClick={onLogout} title="Sign Out">
            <LogOut size={14} />
          </button>
        </div>
      </div>
    </aside>
  );
};


// ════════════════════ MyDashboard.tsx ════════════════════

interface Props { currentUser: AppUser; }

interface MyData {
  employee: Record<string, unknown> | null;
  payslips: Record<string, unknown>[];
  leaves: Record<string, unknown>[];
  attendance: Record<string, unknown>[];
  appraisals: Record<string, unknown>[];
  leaveBalance: { annual: number; sick: number; taken_annual: number; taken_sick: number };
}

const MyDashboard: React.FC<Props> = ({ currentUser }) => {
  const [data, setData] = useState<MyData | null>(null);
  const [tab, setTab] = useState<'overview' | 'payslips' | 'leaves' | 'attendance' | 'appraisals'>('overview');

  useEffect(() => { load(); }, []);

  async function load() {
    const { sqlQuery } = window.tasklet;
    const empId = currentUser.employee_id;
    const [emp, pay, lvs, att, apr, quotaRows, takenRows] = await Promise.all([
      sqlQuery(`SELECT e.*, d.name as department_name FROM hr_employees e LEFT JOIN hr_departments d ON e.department_id = d.id WHERE e.id = ${empId}`),
      sqlQuery(`SELECT * FROM hr_payroll WHERE employee_id = ${empId} ORDER BY month DESC LIMIT 12`),
      sqlQuery(`SELECT * FROM hr_leaves WHERE employee_id = ${empId} ORDER BY created_at DESC`),
      sqlQuery(`SELECT * FROM hr_attendance WHERE employee_id = ${empId} ORDER BY date DESC LIMIT 30`),
      sqlQuery(`SELECT a.*, c.name as cycle_name FROM hr_appraisals a JOIN hr_appraisal_cycles c ON a.cycle_id = c.id WHERE a.employee_id = ${empId} ORDER BY a.created_at DESC`),
      sqlQuery("SELECT key, value FROM hr_company_settings WHERE key IN ('annual_leave_quota','sick_leave_quota')"),
      sqlQuery(`SELECT leave_type, SUM(days) as total FROM hr_leaves WHERE employee_id = ${empId} AND status = 'approved' AND start_date >= date('now','start of year') GROUP BY leave_type`),
    ]);

    const quotas: Record<string, number> = {};
    (quotaRows as { key: string; value: string }[]).forEach(r => { quotas[r.key] = Number(r.value); });
    const taken: Record<string, number> = {};
    (takenRows as { leave_type: string; total: number }[]).forEach(r => { taken[r.leave_type] = Number(r.total); });

    setData({
      employee: emp.length > 0 ? emp[0] as Record<string, unknown> : null,
      payslips: pay as Record<string, unknown>[],
      leaves: lvs as Record<string, unknown>[],
      attendance: att as Record<string, unknown>[],
      appraisals: apr as Record<string, unknown>[],
      leaveBalance: {
        annual: quotas.annual_leave_quota || 30,
        sick: quotas.sick_leave_quota || 15,
        taken_annual: taken.annual || 0,
        taken_sick: taken.sick || 0,
      },
    });
  }

  if (!data) return <div className="flex items-center justify-center h-full"><span className="loading loading-dots loading-md text-primary" /></div>;

  const emp = data.employee;
  const lb = data.leaveBalance;

  const tabs = [
    { key: 'overview' as const, label: 'Overview', icon: <User size={14} /> },
    { key: 'payslips' as const, label: 'Payslips', icon: <Wallet size={14} /> },
    { key: 'leaves' as const, label: 'Leaves', icon: <CalendarOff size={14} /> },
    { key: 'attendance' as const, label: 'Attendance', icon: <CalendarCheck size={14} /> },
    { key: 'appraisals' as const, label: 'Reviews', icon: <Star size={14} /> },
  ];

  function handleExportPayslips() {
    const headers = ['Month', 'Basic Salary', 'Allowances', 'Deductions', 'Net Pay', 'Status'];
    const rows = data!.payslips.map(p => [
      String(p.month), String(p.basic_salary), String(p.allowances), String(p.deductions), String(p.net_salary), String(p.status)
    ]);
    exportCSV(headers, rows, `my-payslips-${new Date().toISOString().slice(0, 10)}.csv`);
  }

  return (
    <div className="p-4 sm:p-6 space-y-4 overflow-auto h-full">
      {/* Header with employee info */}
      <div className="pro-card p-4 sm:p-5">
        <div className="flex flex-col sm:flex-row sm:items-center gap-4">
          <div className="w-14 h-14 rounded-full bg-primary flex items-center justify-center text-xl font-bold text-primary-content shrink-0">
            {emp ? `${String(emp.first_name)[0]}${String(emp.last_name)[0]}` : '?'}
          </div>
          <div className="flex-1 min-w-0">
            <h2 className="text-lg font-bold">{emp ? `${emp.first_name} ${emp.last_name}` : 'Unknown'}</h2>
            <p className="text-sm text-base-content/50">{emp ? `${emp.designation} · ${emp.department_name}` : ''}</p>
            <div className="flex flex-wrap gap-2 mt-1">
              <span className="badge badge-sm badge-primary">{currentUser.role.replace('_', ' ')}</span>
              {emp && <span className="badge badge-sm badge-success">{String(emp.status)}</span>}
            </div>
          </div>
          {emp && (
            <div className="text-right hidden sm:block">
              <p className="text-xs text-base-content/40">Monthly Salary</p>
              <p className="text-lg font-bold text-primary">{formatCurrency(Number(emp.salary))}</p>
            </div>
          )}
        </div>
      </div>

      {/* Tabs */}
      <div className="flex gap-1 overflow-x-auto pb-1">
        {tabs.map(t => (
          <button
            key={t.key}
            className={`btn btn-sm gap-1 whitespace-nowrap ${tab === t.key ? 'btn-primary' : 'btn-ghost'}`}
            onClick={() => setTab(t.key)}
          >
            {t.icon} {t.label}
          </button>
        ))}
      </div>

      {/* Overview Tab */}
      {tab === 'overview' && (
        <div className="space-y-4">
          <div className="grid grid-cols-2 sm:grid-cols-4 gap-3">
            <div className="stat-card p-3">
              <p className="text-[10px] text-base-content/40 uppercase font-semibold">Annual Leave</p>
              <p className="text-xl font-bold">{lb.annual - lb.taken_annual}</p>
              <p className="text-[11px] text-base-content/40">{lb.taken_annual} of {lb.annual} used</p>
              <progress className="progress progress-primary w-full mt-1" value={lb.taken_annual} max={lb.annual} />
            </div>
            <div className="stat-card stat-info p-3">
              <p className="text-[10px] text-base-content/40 uppercase font-semibold">Sick Leave</p>
              <p className="text-xl font-bold">{lb.sick - lb.taken_sick}</p>
              <p className="text-[11px] text-base-content/40">{lb.taken_sick} of {lb.sick} used</p>
              <progress className="progress progress-info w-full mt-1" value={lb.taken_sick} max={lb.sick} />
            </div>
            <div className="stat-card stat-success p-3">
              <p className="text-[10px] text-base-content/40 uppercase font-semibold">Payslips</p>
              <p className="text-xl font-bold">{data.payslips.length}</p>
              <p className="text-[11px] text-base-content/40">This year</p>
            </div>
            <div className="stat-card stat-warning p-3">
              <p className="text-[10px] text-base-content/40 uppercase font-semibold">Reviews</p>
              <p className="text-xl font-bold">{data.appraisals.length}</p>
              <p className="text-[11px] text-base-content/40">All cycles</p>
            </div>
          </div>

          {/* Recent Activity */}
          <div className="pro-card p-4">
            <h3 className="font-semibold text-sm mb-3 flex items-center gap-2"><Clock size={14} className="text-primary" /> Recent Attendance (Last 7 Days)</h3>
            {data.attendance.slice(0, 7).length === 0 ? (
              <p className="text-sm text-base-content/40 text-center py-4">No attendance records</p>
            ) : (
              <div className="space-y-1.5">
                {data.attendance.slice(0, 7).map((a, i) => (
                  <div key={i} className="flex items-center justify-between text-sm bg-base-100 rounded-lg px-3 py-2">
                    <span className="text-base-content/60">{formatDate(String(a.date))}</span>
                    <div className="flex items-center gap-3">
                      <span className="text-xs text-base-content/40">{a.check_in ? `${a.check_in} - ${a.check_out}` : '—'}</span>
                      <span className={`badge badge-sm ${a.status === 'present' ? 'badge-success' : a.status === 'late' ? 'badge-warning' : 'badge-error'}`}>{String(a.status)}</span>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>
      )}

      {/* Payslips Tab */}
      {tab === 'payslips' && (
        <div className="space-y-3">
          <div className="flex justify-end">
            <button className="btn btn-outline btn-sm" onClick={handleExportPayslips}><Download size={14} /> Export CSV</button>
          </div>
          {data.payslips.length === 0 ? (
            <div className="text-center py-10"><Wallet size={36} className="mx-auto text-base-content/15 mb-2" /><p className="text-sm text-base-content/40">No payslips yet</p></div>
          ) : data.payslips.map((p, i) => (
            <div key={i} className="pro-card p-4">
              <div className="flex items-center justify-between mb-2">
                <span className="font-semibold text-sm">{String(p.month)}</span>
                <span className={`badge badge-sm ${p.status === 'paid' ? 'badge-success' : p.status === 'processed' ? 'badge-info' : 'badge-warning'}`}>{String(p.status)}</span>
              </div>
              <div className="grid grid-cols-2 sm:grid-cols-4 gap-2 text-sm">
                <div><p className="text-[10px] text-base-content/40">Basic</p><p className="font-medium">{formatCurrency(Number(p.basic_salary))}</p></div>
                <div><p className="text-[10px] text-base-content/40">Allowances</p><p className="font-medium text-success">{formatCurrency(Number(p.allowances))}</p></div>
                <div><p className="text-[10px] text-base-content/40">Deductions</p><p className="font-medium text-error">{formatCurrency(Number(p.deductions))}</p></div>
                <div><p className="text-[10px] text-base-content/40">Net Pay</p><p className="font-bold text-primary">{formatCurrency(Number(p.net_salary))}</p></div>
              </div>
            </div>
          ))}
        </div>
      )}

      {/* Leaves Tab */}
      {tab === 'leaves' && (
        <div className="space-y-2">
          {data.leaves.length === 0 ? (
            <div className="text-center py-10"><CalendarOff size={36} className="mx-auto text-base-content/15 mb-2" /><p className="text-sm text-base-content/40">No leave requests</p></div>
          ) : data.leaves.map((l, i) => (
            <div key={i} className="pro-card p-3">
              <div className="flex items-center justify-between">
                <div>
                  <span className="badge badge-sm badge-outline capitalize mr-2">{String(l.leave_type)}</span>
                  <span className="text-sm">{formatDate(String(l.start_date))} — {formatDate(String(l.end_date))}</span>
                </div>
                <div className="flex items-center gap-2">
                  <span className="text-xs font-medium">{l.days} day{Number(l.days) !== 1 ? 's' : ''}</span>
                  <span className={`badge badge-sm ${l.status === 'approved' ? 'badge-success' : l.status === 'rejected' ? 'badge-error' : 'badge-warning'}`}>{String(l.status)}</span>
                </div>
              </div>
              {l.reason && <p className="text-xs text-base-content/40 mt-1">{String(l.reason)}</p>}
            </div>
          ))}
        </div>
      )}

      {/* Attendance Tab */}
      {tab === 'attendance' && (
        <div className="space-y-1.5">
          {data.attendance.length === 0 ? (
            <div className="text-center py-10"><CalendarCheck size={36} className="mx-auto text-base-content/15 mb-2" /><p className="text-sm text-base-content/40">No attendance records</p></div>
          ) : data.attendance.map((a, i) => (
            <div key={i} className="flex items-center justify-between bg-base-200 border border-base-300 rounded-lg px-3 py-2 text-sm">
              <span>{formatDate(String(a.date))}</span>
              <div className="flex items-center gap-3">
                <span className="text-xs text-base-content/40">{a.check_in || '—'} → {a.check_out || '—'}</span>
                <span className={`badge badge-sm ${a.status === 'present' ? 'badge-success' : a.status === 'late' ? 'badge-warning' : 'badge-error'}`}>{String(a.status)}</span>
              </div>
            </div>
          ))}
        </div>
      )}

      {/* Appraisals Tab */}
      {tab === 'appraisals' && (
        <div className="space-y-3">
          {data.appraisals.length === 0 ? (
            <div className="text-center py-10"><Star size={36} className="mx-auto text-base-content/15 mb-2" /><p className="text-sm text-base-content/40">No appraisals yet</p></div>
          ) : data.appraisals.map((a, i) => (
            <div key={i} className="pro-card p-4">
              <div className="flex items-center justify-between mb-2">
                <span className="font-semibold text-sm">{String(a.cycle_name)}</span>
                <span className={`badge badge-sm ${a.status === 'completed' ? 'badge-success' : a.status === 'self_review' ? 'badge-info' : 'badge-warning'}`}>{String(a.status).replace('_', ' ')}</span>
              </div>
              <div className="grid grid-cols-3 gap-3">
                <div className="text-center bg-base-100 rounded-lg p-2">
                  <p className="text-[10px] text-base-content/40">Self</p>
                  <p className="font-bold text-lg">{Number(a.self_rating) > 0 ? Number(a.self_rating).toFixed(1) : '—'}</p>
                </div>
                <div className="text-center bg-base-100 rounded-lg p-2">
                  <p className="text-[10px] text-base-content/40">Manager</p>
                  <p className="font-bold text-lg">{Number(a.manager_rating) > 0 ? Number(a.manager_rating).toFixed(1) : '—'}</p>
                </div>
                <div className="text-center bg-base-100 rounded-lg p-2">
                  <p className="text-[10px] text-base-content/40">Final</p>
                  <p className="font-bold text-lg text-primary">{Number(a.final_rating) > 0 ? Number(a.final_rating).toFixed(1) : '—'}</p>
                </div>
              </div>
              {a.goals && <p className="text-xs text-base-content/50 mt-2"><strong>Goals:</strong> {String(a.goals)}</p>}
            </div>
          ))}
        </div>
      )}
    </div>
  );
};


// ════════════════════ Dashboard.tsx ════════════════════

interface DashboardProps { currentUser: AppUser; }

interface Stats {
  totalEmployees: number;
  activeEmployees: number;
  departments: number;
  pendingPayroll: number;
  totalPayroll: number;
  pendingLeaves: number;
  lateToday: number;
  presentToday: number;
}

interface AuditEntry { id: number; user_name: string; action: string; details: string; created_at: string; }

const Dashboard: React.FC<DashboardProps> = ({ currentUser }) => {
  const [stats, setStats] = useState<Stats | null>(null);
  const [recentLeaves, setRecentLeaves] = useState<Record<string, unknown>[]>([]);
  const [activityFeed, setActivityFeed] = useState<AuditEntry[]>([]);

  useEffect(() => { loadStats(); }, []);

  async function loadStats() {
    const { sqlQuery } = window.tasklet;
    const [empTotal, empActive, depts, payPending, payTotal, lvPending, attLate, attPresent, leaves] = await Promise.all([
      sqlQuery('SELECT COUNT(*) as c FROM hr_employees'),
      sqlQuery("SELECT COUNT(*) as c FROM hr_employees WHERE status='active'"),
      sqlQuery('SELECT COUNT(*) as c FROM hr_departments'),
      sqlQuery("SELECT COUNT(*) as c FROM hr_payroll WHERE status='pending'"),
      sqlQuery("SELECT SUM(net_salary) as s FROM hr_payroll WHERE status='pending'"),
      sqlQuery("SELECT COUNT(*) as c FROM hr_leaves WHERE status='pending'"),
      sqlQuery(`SELECT COUNT(*) as c FROM hr_attendance WHERE status='late' AND date=date('now')`),
      sqlQuery(`SELECT COUNT(*) as c FROM hr_attendance WHERE status='present' AND date=date('now')`),
      sqlQuery(`SELECT l.*, e.first_name || ' ' || e.last_name as employee_name
        FROM hr_leaves l JOIN hr_employees e ON l.employee_id = e.id
        ORDER BY l.created_at DESC LIMIT 5`),
    ]);
    setStats({
      totalEmployees: Number((empTotal[0] as Record<string, unknown>).c),
      activeEmployees: Number((empActive[0] as Record<string, unknown>).c),
      departments: Number((depts[0] as Record<string, unknown>).c),
      pendingPayroll: Number((payPending[0] as Record<string, unknown>).c),
      totalPayroll: Number((payTotal[0] as Record<string, unknown>).s) || 0,
      pendingLeaves: Number((lvPending[0] as Record<string, unknown>).c),
      lateToday: Number((attLate[0] as Record<string, unknown>).c),
      presentToday: Number((attPresent[0] as Record<string, unknown>).c),
    });
    setRecentLeaves(leaves as Record<string, unknown>[]);

    const audit = await sqlQuery(
      `SELECT a.id, u.display_name as user_name, a.action, a.details, a.created_at
       FROM hr_audit_log a LEFT JOIN hr_users u ON a.user_id = u.id
       ORDER BY a.created_at DESC LIMIT 8`
    );
    setActivityFeed(audit as unknown as AuditEntry[]);
  }

  if (!stats) return <div className="flex items-center justify-center h-full"><span className="loading loading-dots loading-md text-primary" /></div>;

  const now = new Date();
  const greeting = now.getHours() < 12 ? 'Good morning' : now.getHours() < 17 ? 'Good afternoon' : 'Good evening';
  const dateStr = now.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

  const cards = [
    { label: 'Total Employees', value: stats.totalEmployees, sub: `${stats.activeEmployees} active`, icon: <Users size={18} />, accent: '' },
    { label: 'Departments', value: stats.departments, sub: 'Across company', icon: <Building2 size={18} />, accent: 'stat-info' },
    { label: 'Pending Payroll', value: formatCurrency(stats.totalPayroll), sub: `${stats.pendingPayroll} records`, icon: <Wallet size={18} />, accent: 'stat-warning' },
    { label: 'Pending Leaves', value: stats.pendingLeaves, sub: 'Awaiting approval', icon: <CalendarOff size={18} />, accent: 'stat-error' },
    { label: 'Present Today', value: stats.presentToday, sub: 'Checked in', icon: <TrendingUp size={18} />, accent: 'stat-success' },
    { label: 'Late Today', value: stats.lateToday, sub: 'Arrived late', icon: <Clock size={18} />, accent: 'stat-secondary' },
  ];

  return (
    <div className="p-4 sm:p-6 space-y-5 overflow-auto h-full">
      {/* Welcome header */}
      <div className="flex flex-col sm:flex-row sm:items-end justify-between gap-1">
        <div>
          <h2 className="text-xl font-bold tracking-tight">{greeting}! 👋</h2>
          <p className="text-xs text-base-content/45 mt-0.5">{dateStr}</p>
        </div>
      </div>

      {/* Stat cards */}
      <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3 sm:gap-4">
        {cards.map((c) => (
          <div key={c.label} className={`stat-card ${c.accent} p-4`}>
            <div className="flex items-start justify-between">
              <div className="space-y-1">
                <span className="text-[11px] font-semibold text-base-content/45 uppercase tracking-wide">{c.label}</span>
                <p className="text-2xl font-bold tracking-tight">{c.value}</p>
                <p className="text-xs text-base-content/40">{c.sub}</p>
              </div>
              <div className="w-9 h-9 rounded-lg bg-base-100 flex items-center justify-center text-base-content/30">
                {c.icon}
              </div>
            </div>
          </div>
        ))}
      </div>

      <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
        {/* Recent Leave Requests */}
        <div className="pro-card p-4 sm:p-5">
          <div className="flex items-center justify-between mb-4">
            <h3 className="font-semibold text-sm flex items-center gap-2">
              <CalendarOff size={15} className="text-primary" />
              Recent Leave Requests
            </h3>
            <span className="text-xs text-base-content/35">{recentLeaves.length} latest</span>
          </div>
          {recentLeaves.length === 0 ? (
            <div className="text-center py-8">
              <CalendarOff size={32} className="mx-auto text-base-content/15 mb-2" />
              <p className="text-sm text-base-content/40">No leave requests yet.</p>
            </div>
          ) : (
            <div className="overflow-x-auto -mx-4 sm:-mx-5">
              <table className="table table-sm">
                <thead>
                  <tr>
                    <th className="pl-4 sm:pl-5">Employee</th>
                    <th>Type</th>
                    <th>Days</th>
                    <th>Status</th>
                  </tr>
                </thead>
                <tbody>
                  {recentLeaves.map((lv) => (
                    <tr key={String(lv.id)}>
                      <td className="text-sm font-medium pl-4 sm:pl-5">{String(lv.employee_name)}</td>
                      <td><span className="badge badge-sm badge-outline capitalize">{String(lv.leave_type)}</span></td>
                      <td className="text-sm font-medium">{String(lv.days)}</td>
                      <td>
                        <span className={`badge badge-sm ${lv.status === 'approved' ? 'badge-success' : lv.status === 'rejected' ? 'badge-error' : 'badge-warning'}`}>
                          {String(lv.status)}
                        </span>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}
        </div>

        {/* Activity Feed */}
        <div className="pro-card p-4 sm:p-5">
          <div className="flex items-center justify-between mb-4">
            <h3 className="font-semibold text-sm flex items-center gap-2">
              <Activity size={15} className="text-primary" />
              Activity Feed
            </h3>
            <span className="text-xs text-base-content/35">Recent actions</span>
          </div>
          {activityFeed.length === 0 ? (
            <div className="text-center py-8">
              <Activity size={32} className="mx-auto text-base-content/15 mb-2" />
              <p className="text-sm text-base-content/40">No recent activity</p>
            </div>
          ) : (
            <div className="space-y-2">
              {activityFeed.map((entry) => (
                <div key={entry.id} className="flex items-start gap-3 text-sm">

                    <span className="text-[10px] font-bold text-primary">
                      {entry.user_name ? entry.user_name.split(' ').map(n => n[0]).join('') : 'S'}

      </div>
    </div>
  );
};

const PAGE_SIZE = 10;

const Employees: React.FC = () => {
  const [employees, setEmployees] = useState<Employee[]>([]);
  const [departments, setDepartments] = useState<Department[]>([]);
  const [search, setSearch] = useState('');
  const [filterDept, setFilterDept] = useState('all');
  const [filterStatus, setFilterStatus] = useState('all');
  const [modal, setModal] = useState<'none' | 'add' | 'edit' | 'view'>('none');
  const [selected, setSelected] = useState<Employee | null>(null);
  const [form, setForm] = useState(emptyForm());

  function emptyForm() {
    return { first_name: '', last_name: '', email: '', phone: '', department_id: '', designation: '', date_of_joining: '', salary: '', status: 'active' };
  }

  useEffect(() => { load(); }, []);

  async function load() {
    const { sqlQuery } = window.tasklet;
    const [emps, depts] = await Promise.all([
      sqlQuery(`SELECT e.*, d.name as department_name FROM hr_employees e LEFT JOIN hr_departments d ON e.department_id = d.id ORDER BY e.first_name`),
      sqlQuery('SELECT * FROM hr_departments ORDER BY name'),
    ]);
    setEmployees(emps as unknown as Employee[]);
    setDepartments(depts as unknown as Department[]);
  }

  async function handleSave() {
    const { sqlExec } = window.tasklet;
    const f = form;
    if (!f.first_name || !f.last_name || !f.email || !f.department_id) return;
    if (modal === 'add') {
      await sqlExec(`INSERT INTO hr_employees (first_name, last_name, email, phone, department_id, designation, date_of_joining, salary, status, avatar_color) VALUES ('${escapeSql(f.first_name)}','${escapeSql(f.last_name)}','${escapeSql(f.email)}','${escapeSql(f.phone)}',${Number(f.department_id)},'${escapeSql(f.designation)}','${escapeSql(f.date_of_joining)}',${Number(f.salary) || 0},'${f.status}','${randomAvatarColor()}')`);
    } else if (modal === 'edit' && selected) {
      await sqlExec(`UPDATE hr_employees SET first_name='${escapeSql(f.first_name)}', last_name='${escapeSql(f.last_name)}', email='${escapeSql(f.email)}', phone='${escapeSql(f.phone)}', department_id=${Number(f.department_id)}, designation='${escapeSql(f.designation)}', date_of_joining='${escapeSql(f.date_of_joining)}', salary=${Number(f.salary) || 0}, status='${f.status}' WHERE id=${selected.id}`);
    }
    setModal('none');
    load();
  }

  async function handleDelete(id: number) {
    await window.tasklet.sqlExec(`DELETE FROM hr_employees WHERE id=${id}`);
    load();
  }

  const [currentPage, setCurrentPage] = useState(1);

  const filtered = employees.filter((e) => {
    const matchSearch = `${e.first_name} ${e.last_name} ${e.email} ${e.designation}`.toLowerCase().includes(search.toLowerCase());
    const matchDept = filterDept === 'all' || String(e.department_id) === filterDept;
    const matchStatus = filterStatus === 'all' || e.status === filterStatus;
    return matchSearch && matchDept && matchStatus;
  });

  const totalPages = Math.ceil(filtered.length / PAGE_SIZE);
  const paginated = filtered.slice((currentPage - 1) * PAGE_SIZE, currentPage * PAGE_SIZE);

  function handleExport() {
    exportCSV(
      ['Name', 'Email', 'Phone', 'Department', 'Designation', 'Salary', 'Status', 'Joined'],

        `${e.first_name} ${e.last_name}`, e.email, e.phone, e.department_name || '', e.designation,
        String(e.salary), e.status, e.date_of_joining

      `employees-${new Date().toISOString().slice(0, 10)}.csv`

  return (
    <div className="p-4 sm:p-6 space-y-4 overflow-auto h-full">
      <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-3">

          <div className="page-header-icon bg-primary/10 text-primary">
            <Users size={18} />
          </div>
          <div>
            <h2 className="text-lg font-bold tracking-tight">Employees</h2>

          </div>
        </div>
        <div className="flex gap-2 w-full sm:w-auto">
          <button className="btn btn-outline btn-sm flex-1 sm:flex-none" onClick={handleExport}>
            <Download size={14} /> CSV

          <button className="btn btn-primary btn-sm flex-1 sm:flex-none" onClick={() => { setForm(emptyForm()); setModal('add'); }}>
            <Plus size={16} /> Add Employee
          </button>
        </div>
      </div>

      {/* Filters */}
      <div className="flex flex-col sm:flex-row flex-wrap gap-2">
        <label className="input input-bordered input-sm flex items-center gap-2 w-full sm:w-64">
          <Search className="h-[1em] opacity-50" />
          <input type="search" className="grow" placeholder="Search employees..." value={search} onChange={(e) => { setSearch(e.target.value); setCurrentPage(1); }} />
        </label>
        <div className="flex gap-2 w-full sm:w-auto">
          <select className="select select-bordered select-sm flex-1 sm:flex-none" value={filterDept} onChange={(e) => { setFilterDept(e.target.value); setCurrentPage(1); }}>
            <option value="all">All Departments</option>
            {departments.map((d) => <option key={d.id} value={String(d.id)}>{d.name}</option>)}

          <select className="select select-bordered select-sm flex-1 sm:flex-none" value={filterStatus} onChange={(e) => { setFilterStatus(e.target.value); setCurrentPage(1); }}>
            <option value="all">All Status</option>
            <option value="active">Active</option>
            <option value="inactive">Inactive</option>
            <option value="on_leave">On Leave</option>
          </select>
        </div>
      </div>

      {/* Desktop table */}
      <div className="hidden sm:block overflow-x-auto">
        <table className="table table-sm">
          <thead>
            <tr>
              <th>Employee</th>
              <th>Department</th>
              <th>Designation</th>
              <th>Salary</th>
              <th>Status</th>
              <th>Actions</th>

          </thead>
          <tbody>
            {paginated.map((emp) => (
              <tr key={emp.id}>

                      setModal('edit');

                      <Trash2 size={14} />

        {filtered.length === 0 && (

      {/* Mobile card layout */}

        {paginated.map((emp) => (

                <span className={`badge badge-sm shrink-0 ${emp.status === 'active' ? 'badge-success' : emp.status === 'on_leave' ? 'badge-warning' : 'badge-error'}`}>

                  setModal('edit');

const Departments: React.FC = () => {
  const [departments, setDepartments] = useState<(Department & { employee_count: number })[]>([]);
  const [modal, setModal] = useState<'none' | 'add' | 'edit'>('none');
  const [selected, setSelected] = useState<Department | null>(null);
  const [form, setForm] = useState({ name: '', head_name: '', budget: '' });

  useEffect(() => { load(); }, []);

  async function load() {
    const rows = await window.tasklet.sqlQuery(
      `SELECT d.*, (SELECT COUNT(*) FROM hr_employees e WHERE e.department_id = d.id) as employee_count FROM hr_departments d ORDER BY d.name`
    );
    setDepartments(rows as unknown as (Department & { employee_count: number })[]);
  }

  async function handleSave() {
    const { sqlExec } = window.tasklet;
    if (!form.name) return;
    if (modal === 'add') {
      await sqlExec(`INSERT INTO hr_departments (name, head_name, budget) VALUES ('${escapeSql(form.name)}','${escapeSql(form.head_name)}',${Number(form.budget) || 0})`);
    } else if (modal === 'edit' && selected) {
      await sqlExec(`UPDATE hr_departments SET name='${escapeSql(form.name)}', head_name='${escapeSql(form.head_name)}', budget=${Number(form.budget) || 0} WHERE id=${selected.id}`);
    }
    setModal('none');
    load();
  }

  async function handleDelete(id: number) {
    await window.tasklet.sqlExec(`DELETE FROM hr_departments WHERE id=${id}`);
    load();
  }

  return (
    <div className="p-6 space-y-4 overflow-auto h-full">
      <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-3">
        <div className="page-header">

            <div className="card-body p-4">
              <div className="flex items-start justify-between">
                <div>
                  <h3 className="font-semibold">{dept.name}</h3>
                  <p className="text-sm text-base-content/60">{dept.head_name || 'No head assigned'}</p>
                </div>
                <div className="flex gap-1">
                  <button className="btn btn-ghost btn-xs" onClick={() => {
                    setSelected(dept);
                    setForm({ name: dept.name, head_name: dept.head_name, budget: String(dept.budget) });

                <span className="badge badge-sm badge-outline">{formatCurrency(dept.budget)}</span>
              </div>
            </div>
          </div>
        ))}
      </div>

      {departments.length === 0 && (
        <div className="text-center py-10">
          <Building2 size={36} className="mx-auto text-base-content/15 mb-2" />
          <p className="text-sm text-base-content/40 font-medium">No departments yet</p>

  const [month, setMonth] = useState(currentMonth());
  const [search, setSearch] = useState('');
  const [filterStatus, setFilterStatus] = useState('all');

  useEffect(() => { load(); }, [month]);

  async function load() {
    const rows = await window.tasklet.sqlQuery(
      `SELECT p.*, e.first_name || ' ' || e.last_name as employee_name, d.name as department_name
       FROM hr_payroll p
       JOIN hr_employees e ON p.employee_id = e.id
       LEFT JOIN hr_departments d ON e.department_id = d.id
       WHERE p.month = '${month}'
       ORDER BY e.first_name`
    );
    setRecords(rows as unknown as PayrollRecord[]);
  }

  async function generatePayroll() {
    const { sqlExec, sqlQuery } = window.tasklet;
    const existing = await sqlQuery(`SELECT COUNT(*) as c FROM hr_payroll WHERE month='${month}'`);
    if (Number((existing[0] as Record<string, unknown>).c) > 0) return;
    await sqlExec(`INSERT INTO hr_payroll (employee_id, month, basic_salary, allowances, deductions, net_salary, status)
      SELECT id, '${month}', salary, salary * 0.15, salary * 0.05, salary + salary * 0.15 - salary * 0.05, 'pending'
      FROM hr_employees WHERE status = 'active'`);
    load();
  }

  async function markProcessed(id: number) {
    await window.tasklet.sqlExec(`UPDATE hr_payroll SET status='processed' WHERE id=${id}`);
    load();
  }

  async function markPaid(id: number) {
    await window.tasklet.sqlExec(`UPDATE hr_payroll SET status='paid' WHERE id=${id}`);
    load();
  }

  async function processAll() {
    await window.tasklet.sqlExec(`UPDATE hr_payroll SET status='processed' WHERE month='${month}' AND status='pending'`);
    load();
  }

  async function payAll() {
    await window.tasklet.sqlExec(`UPDATE hr_payroll SET status='paid' WHERE month='${month}' AND status='processed'`);
    load();
  }

  const filtered = records.filter((r) => {
    const matchSearch = (r.employee_name || '').toLowerCase().includes(search.toLowerCase());
    const matchStatus = filterStatus === 'all' || r.status === filterStatus;
    return matchSearch && matchStatus;
  });

  const totalNet = filtered.reduce((s, r) => s + r.net_salary, 0);
  const pending = records.filter((r) => r.status === 'pending').length;
  const processed = records.filter((r) => r.status === 'processed').length;
  const paid = records.filter((r) => r.status === 'paid').length;

  return (
    <div className="p-4 sm:p-6 space-y-4 overflow-auto h-full">
      <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-3">
        <div className="page-header">
          <div className="page-header-icon bg-primary/10 text-primary">
            <Wallet size={18} />
          </div>
          <div>
            <h2 className="text-lg font-bold tracking-tight">Payroll</h2>
            <p className="text-xs text-base-content/40">Monthly payroll management</p>
          </div>
        </div>
        <div className="flex gap-2">
          <input type="month" className="input input-bordered input-sm flex-1 sm:flex-none" value={month} onChange={(e) => setMonth(e.target.value)} />
          <button className="btn btn-primary btn-sm" onClick={generatePayroll}>
            <RefreshCw size={14} /> Generate
          </button>
        </div>
      </div>

      {/* Summary cards */}
      <div className="grid grid-cols-2 sm:grid-cols-4 gap-3">
        <div className="stat-card p-3 sm:p-4">
          <p className="text-[11px] font-semibold text-base-content/45 uppercase tracking-wide">Total Net</p>
          <p className="text-xl font-bold mt-1">{formatCurrency(totalNet)}</p>
        </div>
        <div className="stat-card stat-warning p-3 sm:p-4">
          <p className="text-[11px] font-semibold text-base-content/45 uppercase tracking-wide">Pending</p>
          <p className="text-xl font-bold mt-1">{pending}</p>
        </div>
        <div className="stat-card stat-info p-3 sm:p-4">
          <p className="text-[11px] font-semibold text-base-content/45 uppercase tracking-wide">Processed</p>
          <p className="text-xl font-bold mt-1">{processed}</p>
        </div>
        <div className="stat-card stat-success p-3 sm:p-4">
          <p className="text-[11px] font-semibold text-base-content/45 uppercase tracking-wide">Paid</p>
          <p className="text-xl font-bold mt-1">{paid}</p>
        </div>
      </div>

      {/* Filters & bulk actions */}
      <div className="flex flex-col sm:flex-row flex-wrap gap-2 items-stretch sm:items-center">
        <label className="input input-bordered input-sm flex items-center gap-2 w-full sm:w-64">
          <Search className="h-[1em] opacity-50" />
          <input type="search" className="grow" placeholder="Search..." value={search} onChange={(e) => setSearch(e.target.value)} />
        </label>
        <select className="select select-bordered select-sm" value={filterStatus} onChange={(e) => setFilterStatus(e.target.value)}>
          <option value="all">All Status</option>
          <option value="pending">Pending</option>
          <option value="processed">Processed</option>
          <option value="paid">Paid</option>
        </select>
        <div className="flex gap-2 sm:ml-auto">
          {pending > 0 && <button className="btn btn-warning btn-sm btn-outline flex-1 sm:flex-none" onClick={processAll}><CheckCircle size={14} /> Process All</button>}
          {processed > 0 && <button className="btn btn-success btn-sm btn-outline flex-1 sm:flex-none" onClick={payAll}><DollarSign size={14} /> Pay All</button>}

      </div>

      <div className="hidden sm:block overflow-x-auto">
        <table className="table table-sm">

          </thead>

                <td>

              </tr>
            ))}
          </tbody>
        </table>
        {filtered.length === 0 && (

            <Wallet size={36} className="mx-auto text-base-content/15 mb-2" />
            <p className="text-sm text-base-content/40 font-medium">No payroll records found</p>

        )}
      </div>

      {/* Mobile cards */}
      <div className="sm:hidden space-y-3">
        {filtered.map((rec) => (

    const { sqlQuery } = window.tasklet;

      sqlQuery(`SELECT l.*, e.first_name || ' ' || e.last_name as employee_name
        FROM hr_leaves l JOIN hr_employees e ON l.employee_id = e.id
        ORDER BY l.created_at DESC`),
      sqlQuery("SELECT * FROM hr_employees WHERE status IN ('active','on_leave') ORDER BY first_name"),
    ]);
    setLeaves(lvs as unknown as LeaveRequest[]);
    setEmployees(emps as unknown as Employee[]);
  }

    if (!form.employee_id || !form.start_date || !form.end_date) return;
    const start = new Date(form.start_date);
    const end = new Date(form.end_date);
    const days = Math.max(1, Math.ceil((end.getTime() - start.getTime()) / (1000 * 60 * 60 * 24)) + 1);
    await window.tasklet.sqlExec(
      `INSERT INTO hr_leaves (employee_id, leave_type, start_date, end_date, days, reason, status) VALUES (${Number(form.employee_id)},'${form.leave_type}','${form.start_date}','${form.end_date}',${days},'${escapeSql(form.reason)}','pending')`
    );
    setModal(false);
    load();

    const matchSearch = (l.employee_name || '').toLowerCase().includes(search.toLowerCase());

          <Plus size={16} /> New Request

      </div>

      <div className="flex flex-col sm:flex-row flex-wrap gap-2">
        <label className="input input-bordered input-sm flex items-center gap-2 w-full sm:w-64">
          <Search className="h-[1em] opacity-50" />
          <input type="search" className="grow" placeholder="Search..." value={search} onChange={(e) => setSearch(e.target.value)} />
        </label>
        <div className="flex gap-2 w-full sm:w-auto">
          <select className="select select-bordered select-sm flex-1 sm:flex-none" value={filterStatus} onChange={(e) => setFilterStatus(e.target.value)}>

            <option value="paternity">Paternity</option>
