// ════════════════════ PricingTax.tsx ════════════════════

interface Props { currentUser: AppUser; }

type Tab = 'pricing' | 'tax' | 'company_info';

const CURRENCIES: { code: SupportedCurrency; label: string; flag: string }[] = [
  { code: 'AED', label: 'UAE Dirham', flag: '🇦🇪' },
  { code: 'USD', label: 'US Dollar', flag: '🇺🇸' },
  { code: 'INR', label: 'Indian Rupee', flag: '🇮🇳' },
];

const PLAN_META: Record<PlanTier, { label: string; icon: React.ReactNode; color: string }> = {
  free: { label: 'Free', icon: <Zap size={16} />, color: 'bg-base-200 text-base-content/50' },
  starter: { label: 'Starter', icon: <Rocket size={16} />, color: 'bg-info/15 text-info' },
  professional: { label: 'Professional', icon: <Crown size={16} />, color: 'bg-primary/15 text-primary' },
  enterprise: { label: 'Enterprise', icon: <Building2 size={16} />, color: 'bg-warning/15 text-warning' },
};

const PricingTax: React.FC<Props> = ({ currentUser }) => {
  const [tab, setTab] = useState<Tab>('pricing');
  const [pricing, setPricing] = useState<PlanPricing[]>([]);
  const [taxes, setTaxes] = useState<TaxConfig[]>([]);
  const [companyInfo, setCompanyInfo] = useState<Record<string, string>>({});
  const [editingPricing, setEditingPricing] = useState<Record<number, { monthly: string; annual: string }>>({});
  const [editingTax, setEditingTax] = useState<number | null>(null);
  const [editTaxForm, setEditTaxForm] = useState<Partial<TaxConfig>>({});
  const [saving, setSaving] = useState(false);
  const [saved, setSaved] = useState('');
  const [loading, setLoading] = useState(true);
  const [activeCurrency, setActiveCurrencyLocal] = useState<SupportedCurrency>(getActiveCurrency());

  useEffect(() => { loadAll(); }, []);

  async function loadAll() {
    const { sqlQuery } = window.tasklet;
    const [pRows, tRows, sRows] = await Promise.all([
      sqlQuery('SELECT * FROM hr_plan_pricing ORDER BY id'),
      sqlQuery('SELECT * FROM hr_tax_config ORDER BY id'),
      sqlQuery('SELECT key, value FROM hr_company_settings'),
    ]);
    setPricing(pRows as unknown as PlanPricing[]);
    setTaxes(tRows as unknown as TaxConfig[]);
    const map: Record<string, string> = {};
    (sRows as { key: string; value: string }[]).forEach(r => { map[r.key] = r.value; });
    setCompanyInfo(map);
    setActiveCurrencyLocal((map.currency || 'AED') as SupportedCurrency);
    setLoading(false);
  }

  // ── Pricing functions ──
  function startEditPricing(p: PlanPricing) {
    setEditingPricing(prev => ({ ...prev, [p.id]: { monthly: String(p.price_monthly), annual: String(p.price_annual) } }));
  }

  function cancelEditPricing(id: number) {
    setEditingPricing(prev => { const n = { ...prev }; delete n[id]; return n; });
  }

  async function savePricing(p: PlanPricing) {
    const edit = editingPricing[p.id];
    if (!edit) return;
    const monthly = parseFloat(edit.monthly) || 0;
    const annual = parseFloat(edit.annual) || 0;
    setSaving(true);
    await window.tasklet.sqlExec(`UPDATE hr_plan_pricing SET price_monthly=${monthly}, price_annual=${annual} WHERE id=${p.id}`);
    await logAudit(currentUser.id, 'update_pricing', 'pricing', p.id, `Updated ${p.plan} ${p.currency}: ${monthly}/mo, ${annual}/yr`);
    cancelEditPricing(p.id);
    setSaving(false);
    setSaved('pricing');
    setTimeout(() => setSaved(''), 2000);
    loadAll();
  }

  async function saveAllPricing() {
    setSaving(true);
    for (const [idStr, edit] of Object.entries(editingPricing) as [string, { monthly: string; annual: string }][]) {
      const id = Number(idStr);
      const monthly = parseFloat(edit.monthly) || 0;
      const annual = parseFloat(edit.annual) || 0;
      await window.tasklet.sqlExec(`UPDATE hr_plan_pricing SET price_monthly=${monthly}, price_annual=${annual} WHERE id=${id}`);
    }
    await logAudit(currentUser.id, 'update_pricing', 'pricing', 0, `Bulk updated ${Object.keys(editingPricing).length} price entries`);
    setEditingPricing({});
    setSaving(false);
    setSaved('pricing');
    setTimeout(() => setSaved(''), 2000);
    loadAll();
  }

  // ── Tax functions ──
  function startEditTax(t: TaxConfig) {
    setEditingTax(t.id);
    setEditTaxForm({ ...t });
  }

  async function saveTax() {
    if (!editTaxForm || editingTax === null) return;
    setSaving(true);
    const { tax_name, tax_rate, tax_number, enabled } = editTaxForm;
    await window.tasklet.sqlExec(`UPDATE hr_tax_config SET tax_name='${escapeSql(tax_name || '')}', tax_rate=${tax_rate || 0}, tax_number='${escapeSql(tax_number || '')}', enabled=${enabled ? 1 : 0} WHERE id=${editingTax}`);
    await logAudit(currentUser.id, 'update_tax', 'tax', editingTax, `Updated tax: ${tax_name} (${tax_rate}%)`);
    setEditingTax(null);
    setEditTaxForm({});
    setSaving(false);
    setSaved('tax');
    setTimeout(() => setSaved(''), 2000);
    loadAll();
  }

  async function toggleTax(t: TaxConfig) {
    const newVal = t.enabled ? 0 : 1;
    await window.tasklet.sqlExec(`UPDATE hr_tax_config SET enabled=${newVal} WHERE id=${t.id}`);
    await logAudit(currentUser.id, 'toggle_tax', 'tax', t.id, `${newVal ? 'Enabled' : 'Disabled'} ${t.tax_name} for ${t.region_name}`);
    loadAll();
  }

  // ── Company invoice info ──
  async function saveCompanyInfo() {
    setSaving(true);
    const fields = ['invoice_company_name', 'invoice_address', 'invoice_trn', 'invoice_email', 'invoice_phone', 'invoice_footer'];
    for (const key of fields) {
      if (companyInfo[key] !== undefined) {
        await window.tasklet.sqlExec(`INSERT OR REPLACE INTO hr_company_settings (key, value) VALUES ('${key}', '${escapeSql(companyInfo[key])}')`);
      }
    }
    await logAudit(currentUser.id, 'update_invoice_info', 'settings', 0, 'Updated invoice company information');
    setSaving(false);
    setSaved('company');
    setTimeout(() => setSaved(''), 2000);
  }

  const groupedPricing: Record<string, PlanPricing[]> = {};
  pricing.forEach(p => {
    if (!groupedPricing[p.currency]) groupedPricing[p.currency] = [];
    groupedPricing[p.currency].push(p);
  });

  const tabs: { key: Tab; label: string; icon: React.ReactNode }[] = [
    { key: 'pricing', label: 'Plan Pricing', icon: <DollarSign size={15} /> },
    { key: 'tax', label: 'Tax Configuration', icon: <Percent size={15} /> },
    { key: 'company_info', label: 'Invoice Settings', icon: <FileText size={15} /> },
  ];

  if (loading) return <div className="flex items-center justify-center h-64"><span className="loading loading-dots loading-md text-primary" /></div>;

  const isAdmin = currentUser.role === 'admin';

  return (
    <div className="h-full overflow-y-auto">
      <div className="p-4 md:p-6 space-y-5">
        {/* Header */}
        <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-3">
          <div className="page-header">
            <div className="page-header-icon bg-warning/15 text-warning"><DollarSign size={18} /></div>
            <div>
              <h1 className="text-lg font-bold">Pricing & Tax Manager</h1>
              <p className="text-xs text-base-content/50">Configure plan pricing, tax rates, and invoice settings</p>
            </div>
          </div>
          {tab === 'pricing' && Object.keys(editingPricing).length > 0 && (
            <button className={`btn btn-primary btn-sm ${saving ? 'loading' : ''}`} onClick={saveAllPricing} disabled={saving}>
              {saved === 'pricing' ? <Check size={16} /> : <Save size={16} />}
              {saved === 'pricing' ? 'Saved!' : `Save ${Object.keys(editingPricing).length} Changes`}
            </button>
          )}
        </div>

        {!isAdmin && (
          <div className="alert alert-warning py-2 text-sm">
            <AlertCircle size={16} />
            <span>Only administrators can modify pricing and tax settings.</span>
          </div>
        )}

        {/* Tabs */}
        <div className="tabs tabs-boxed bg-base-200 w-fit overflow-x-auto">
          {tabs.map(t => (
            <button key={t.key} className={`tab tab-sm gap-1.5 ${tab === t.key ? 'tab-active' : ''}`} onClick={() => setTab(t.key)}>
              {t.icon}{t.label}
            </button>
          ))}
        </div>

        {/* ═══ PRICING TAB ═══ */}
        {tab === 'pricing' && (
          <div className="space-y-5">
            <div className="alert alert-info py-2">
              <Globe size={16} />
              <span className="text-sm">Set different prices for each currency. Active currency: <strong>{activeCurrency}</strong>. Tenants see prices in their configured currency.</span>
            </div>

            {CURRENCIES.map(curr => {
              const plans = groupedPricing[curr.code] || [];
              return (
                <div key={curr.code} className="pro-card overflow-hidden">
                  <div className="p-4 bg-base-200/50 border-b border-base-200">
                    <h3 className="font-bold text-sm flex items-center gap-2">
                      <span className="text-lg">{curr.flag}</span>
                      {curr.label} ({curr.code})
                    </h3>
                  </div>

                  {/* Desktop Table */}
                  <div className="hidden md:block overflow-x-auto">
                    <table className="table table-sm">
                      <thead>
                        <tr className="bg-base-200/30">
                          <th>Plan</th>
                          <th className="text-right">Monthly Price</th>
                          <th className="text-right">Annual Price</th>
                          <th className="text-right">Annual per Month</th>
                          <th className="text-right">Savings</th>
                          {isAdmin && <th className="text-center w-24">Actions</th>}
                        </tr>
                      </thead>
                      <tbody>
                        {plans.map(p => {
                          const meta = PLAN_META[p.plan as PlanTier];
                          const edit = editingPricing[p.id];
                          const annualPerMonth = p.price_annual > 0 ? Math.round(p.price_annual / 12) : 0;
                          const savingsPercent = p.price_monthly > 0 ? Math.round((1 - annualPerMonth / p.price_monthly) * 100) : 0;
                          return (
                            <tr key={p.id} className="hover">
                              <td>
                                <div className="flex items-center gap-2">
                                  <div className={`w-7 h-7 rounded-lg flex items-center justify-center ${meta?.color}`}>
                                    {meta?.icon}
                                  </div>
                                  <span className="font-semibold text-sm">{meta?.label}</span>
                                </div>
                              </td>
                              <td className="text-right">
                                {edit ? (
                                  <input className="input input-bordered input-sm w-28 text-right" type="number" step="0.01" value={edit.monthly}
                                    onChange={e => setEditingPricing(prev => ({ ...prev, [p.id]: { ...prev[p.id], monthly: e.target.value } }))} />
                                ) : (
                                  <span className="font-mono text-sm">{formatCurrency(p.price_monthly, curr.code)}</span>
                                )}
                              </td>
                              <td className="text-right">
                                {edit ? (
                                  <input className="input input-bordered input-sm w-28 text-right" type="number" step="0.01" value={edit.annual}
                                    onChange={e => setEditingPricing(prev => ({ ...prev, [p.id]: { ...prev[p.id], annual: e.target.value } }))} />
                                ) : (
                                  <span className="font-mono text-sm">{formatCurrency(p.price_annual, curr.code)}</span>
                                )}
                              </td>
                              <td className="text-right text-xs text-base-content/50">
                                {annualPerMonth > 0 ? formatCurrency(annualPerMonth, curr.code) + '/mo' : '—'}
                              </td>
                              <td className="text-right">
                                {savingsPercent > 0 ? (
                                  <span className="badge badge-success badge-sm">Save {savingsPercent}%</span>
                                ) : p.plan === 'free' ? (
                                  <span className="text-xs text-base-content/30">—</span>
                                ) : (
                                  <span className="text-xs text-base-content/30">0%</span>
                                )}
                              </td>
                              {isAdmin && (
                                <td className="text-center">
                                  {edit ? (
                                    <div className="flex items-center justify-center gap-1">
                                      <button className="btn btn-success btn-xs" onClick={() => savePricing(p)} disabled={saving}>
                                        <Check size={12} />
                                      </button>
                                      <button className="btn btn-ghost btn-xs" onClick={() => cancelEditPricing(p.id)}>
                                        <X size={12} />
                                      </button>
                                    </div>
                                  ) : (
                                    <button className="btn btn-ghost btn-xs" onClick={() => startEditPricing(p)} disabled={p.plan === 'free'}>
                                      <Edit3 size={12} />
                                    </button>
                                  )}
                                </td>
                              )}
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  </div>

                  {/* Mobile Cards */}
                  <div className="md:hidden divide-y divide-base-200">
                    {plans.map(p => {
                      const meta = PLAN_META[p.plan as PlanTier];
                      const edit = editingPricing[p.id];
                      return (
                        <div key={p.id} className="p-4 space-y-2">
                          <div className="flex items-center justify-between">
                            <div className="flex items-center gap-2">
                              <div className={`w-7 h-7 rounded-lg flex items-center justify-center ${meta?.color}`}>
                                {meta?.icon}
                              </div>
                              <span className="font-semibold text-sm">{meta?.label}</span>
                            </div>
                            {isAdmin && !edit && p.plan !== 'free' && (
                              <button className="btn btn-ghost btn-xs" onClick={() => startEditPricing(p)}>
                                <Edit3 size={12} />
                              </button>
                            )}
                          </div>
                          {edit ? (
                            <div className="space-y-2">
                              <div className="flex gap-2">
                                <div className="flex-1">
                                  <label className="label py-0"><span className="label-text text-[10px]">Monthly</span></label>
                                  <input className="input input-bordered input-sm w-full" type="number" step="0.01" value={edit.monthly}
                                    onChange={e => setEditingPricing(prev => ({ ...prev, [p.id]: { ...prev[p.id], monthly: e.target.value } }))} />
                                </div>
                                <div className="flex-1">
                                  <label className="label py-0"><span className="label-text text-[10px]">Annual</span></label>
                                  <input className="input input-bordered input-sm w-full" type="number" step="0.01" value={edit.annual}
                                    onChange={e => setEditingPricing(prev => ({ ...prev, [p.id]: { ...prev[p.id], annual: e.target.value } }))} />
                                </div>
                              </div>
                              <div className="flex gap-2">
                                <button className="btn btn-success btn-xs flex-1" onClick={() => savePricing(p)}>Save</button>
                                <button className="btn btn-ghost btn-xs flex-1" onClick={() => cancelEditPricing(p.id)}>Cancel</button>
                              </div>
                            </div>
                          ) : (
                            <div className="flex justify-between text-xs">
                              <span className="text-base-content/50">Monthly: <strong className="text-base-content">{formatCurrency(p.price_monthly, curr.code)}</strong></span>
                              <span className="text-base-content/50">Annual: <strong className="text-base-content">{formatCurrency(p.price_annual, curr.code)}</strong></span>
                            </div>
                          )}
                        </div>
                      );
                    })}
                  </div>
                </div>
              );
            })}
          </div>
        )}

        {/* ═══ TAX TAB ═══ */}
        {tab === 'tax' && (
          <div className="space-y-4">
            <div className="alert alert-info py-2">
              <Percent size={16} />
              <span className="text-sm">Configure tax rates for each region. Only enabled taxes are applied to invoices for tenants using that currency.</span>
            </div>

            <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
              {taxes.map(t => (
                <div key={t.id} className={`pro-card overflow-hidden ${!t.enabled ? 'opacity-60' : ''}`}>
                  <div className={`p-4 border-b border-base-200 ${t.enabled ? 'bg-success/5' : 'bg-base-200/50'}`}>
                    <div className="flex items-center justify-between">
                      <h3 className="font-bold text-sm flex items-center gap-2">
                        <span className="text-lg">{t.region_code === 'UAE' ? '🇦🇪' : t.region_code === 'IN' ? '🇮🇳' : '🇺🇸'}</span>
                        {t.region_name}
                      </h3>
                      {isAdmin && (
                        <input type="checkbox" className="toggle toggle-success toggle-sm" checked={!!t.enabled}
                          onChange={() => toggleTax(t)} />
                      )}
                    </div>
                  </div>

                  {editingTax === t.id ? (
                    <div className="p-4 space-y-3">
                      <div>
                        <label className="label py-0"><span className="label-text text-xs">Tax Name</span></label>
                        <input className="input input-bordered input-sm w-full" value={editTaxForm.tax_name || ''}
                          onChange={e => setEditTaxForm({ ...editTaxForm, tax_name: e.target.value })} />
                      </div>
                      <div>
                        <label className="label py-0"><span className="label-text text-xs">Tax Rate (%)</span></label>
                        <input className="input input-bordered input-sm w-full" type="number" step="0.1" value={editTaxForm.tax_rate || 0}
                          onChange={e => setEditTaxForm({ ...editTaxForm, tax_rate: parseFloat(e.target.value) || 0 })} />
                      </div>
                      <div>
                        <label className="label py-0"><span className="label-text text-xs">Tax Registration No. (TRN/GSTIN)</span></label>
                        <input className="input input-bordered input-sm w-full" value={editTaxForm.tax_number || ''} placeholder="e.g., 100xxxxxxxxx003"
                          onChange={e => setEditTaxForm({ ...editTaxForm, tax_number: e.target.value })} />
                      </div>
                      <div className="flex gap-2">
                        <button className="btn btn-primary btn-sm flex-1" onClick={saveTax} disabled={saving}>
                          <Save size={14} /> Save
                        </button>
                        <button className="btn btn-ghost btn-sm flex-1" onClick={() => { setEditingTax(null); setEditTaxForm({}); }}>
                          Cancel
                        </button>
                      </div>
                    </div>
                  ) : (
                    <div className="p-4 space-y-3">
                      <div className="flex items-baseline justify-between">
                        <span className="text-xs text-base-content/50">{t.tax_name}</span>
                        <span className="text-2xl font-bold">{t.tax_rate}%</span>
                      </div>
                      <div className="space-y-1.5">
                        <div className="flex justify-between text-xs">
                          <span className="text-base-content/50">Applies to</span>
                          <span className="font-medium">{t.applies_to_currency}</span>
                        </div>
                        <div className="flex justify-between text-xs">
                          <span className="text-base-content/50">Registration No.</span>
                          <span className="font-mono text-[11px]">{t.tax_number || '—'}</span>
                        </div>
                        <div className="flex justify-between text-xs">
                          <span className="text-base-content/50">Status</span>
                          <span className={`badge badge-xs ${t.enabled ? 'badge-success' : 'badge-ghost'}`}>{t.enabled ? 'Active' : 'Disabled'}</span>
                        </div>
                      </div>
                      {isAdmin && (
                        <button className="btn btn-outline btn-sm w-full mt-2" onClick={() => startEditTax(t)}>
                          <Edit3 size={14} /> Edit Settings
                        </button>
                      )}
                    </div>
                  )}
                </div>
              ))}
            </div>

            {/* Tax Preview */}
            <div className="pro-card p-5">
              <h3 className="font-semibold text-sm mb-3 flex items-center gap-2">
                <Receipt size={15} className="text-primary" /> Tax Calculation Preview
              </h3>
              <div className="overflow-x-auto">
                <table className="table table-sm">
                  <thead>
                    <tr className="bg-base-200/30">
                      <th>Plan</th>
                      {taxes.filter(t => t.enabled).map(t => (
                        <th key={t.id} className="text-right">{t.tax_name} ({t.tax_rate}%)</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {(['starter', 'professional', 'enterprise'] as PlanTier[]).map(plan => {
                      const currPricing = pricing.find(p => p.plan === plan && p.currency === activeCurrency);
                      const monthlyAmt = currPricing?.price_monthly || 0;
                      return (
                        <tr key={plan}>
                          <td className="font-semibold text-sm">{PLAN_META[plan].label} ({formatCurrency(monthlyAmt)}/mo)</td>
                          {taxes.filter(t => t.enabled).map(t => {
                            const taxAmt = monthlyAmt * (t.tax_rate / 100);
                            return (
                              <td key={t.id} className="text-right font-mono text-xs">
                                +{formatCurrency(taxAmt)} = <strong>{formatCurrency(monthlyAmt + taxAmt)}</strong>
                              </td>
                            );
                          })}
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        )}

        {/* ═══ COMPANY INVOICE INFO TAB ═══ */}
        {tab === 'company_info' && (
          <div className="space-y-4">
            <div className="alert alert-info py-2">
              <FileText size={16} />
              <span className="text-sm">This information appears on all generated invoices.</span>
            </div>

            <div className="pro-card p-5 space-y-4">
              <h3 className="font-semibold text-sm flex items-center gap-2">
                <Building2 size={15} className="text-primary" /> Company Details for Invoices
              </h3>
              <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                  <label className="label"><span className="label-text text-xs font-medium">Company Legal Name</span></label>
                  <input className="input input-bordered input-sm w-full" value={companyInfo.invoice_company_name || ''} disabled={!isAdmin}
                    placeholder="e.g., TechVision Solutions LLC"
                    onChange={e => setCompanyInfo({ ...companyInfo, invoice_company_name: e.target.value })} />
                </div>
                <div>
                  <label className="label"><span className="label-text text-xs font-medium">Email</span></label>
                  <input className="input input-bordered input-sm w-full" value={companyInfo.invoice_email || ''} disabled={!isAdmin}
                    placeholder="billing@company.com"
                    onChange={e => setCompanyInfo({ ...companyInfo, invoice_email: e.target.value })} />
                </div>
                <div>
                  <label className="label"><span className="label-text text-xs font-medium">Phone</span></label>
                  <input className="input input-bordered input-sm w-full" value={companyInfo.invoice_phone || ''} disabled={!isAdmin}
                    placeholder="+971 4 xxx xxxx"
                    onChange={e => setCompanyInfo({ ...companyInfo, invoice_phone: e.target.value })} />
                </div>
                <div>
                  <label className="label"><span className="label-text text-xs font-medium">TRN / GSTIN / Tax ID</span></label>
                  <input className="input input-bordered input-sm w-full" value={companyInfo.invoice_trn || ''} disabled={!isAdmin}
                    placeholder="100xxxxxxxxx003"
                    onChange={e => setCompanyInfo({ ...companyInfo, invoice_trn: e.target.value })} />
                </div>
              </div>
              <div>
                <label className="label"><span className="label-text text-xs font-medium">Address</span></label>
                <textarea className="textarea textarea-bordered textarea-sm w-full" rows={2} value={companyInfo.invoice_address || ''} disabled={!isAdmin}
                  placeholder="Office 123, Business Bay, Dubai, UAE"
                  onChange={e => setCompanyInfo({ ...companyInfo, invoice_address: e.target.value })} />
              </div>
              <div>
                <label className="label"><span className="label-text text-xs font-medium">Invoice Footer Note</span></label>
                <textarea className="textarea textarea-bordered textarea-sm w-full" rows={2} value={companyInfo.invoice_footer || ''} disabled={!isAdmin}
                  placeholder="Thank you for your business. Payment is due within 15 days."
                  onChange={e => setCompanyInfo({ ...companyInfo, invoice_footer: e.target.value })} />
              </div>
              {isAdmin && (
                <div className="flex justify-end">
                  <button className={`btn btn-primary btn-sm ${saving ? 'loading' : ''}`} onClick={saveCompanyInfo} disabled={saving}>
                    {saved === 'company' ? <Check size={16} /> : <Save size={16} />}
                    {saved === 'company' ? 'Saved!' : 'Save Invoice Settings'}
                  </button>
                </div>
              )}
            </div>

            {/* Invoice Preview */}
            <div className="pro-card p-5">
              <h3 className="font-semibold text-sm mb-4 flex items-center gap-2">
                <FileText size={15} className="text-primary" /> Invoice Preview
              </h3>
              <div className="border border-base-200 rounded-xl p-6 bg-base-100 max-w-2xl mx-auto">
                {/* Header */}
                <div className="flex justify-between items-start border-b border-base-200 pb-4 mb-4">
                  <div>
                    <h4 className="text-lg font-bold text-primary">{companyInfo.invoice_company_name || companyInfo.company_name || 'Your Company'}</h4>
                    <p className="text-xs text-base-content/50 whitespace-pre-line">{companyInfo.invoice_address || 'Address not set'}</p>
                    {companyInfo.invoice_email && <p className="text-xs text-base-content/50">{companyInfo.invoice_email}</p>}
                    {companyInfo.invoice_phone && <p className="text-xs text-base-content/50">{companyInfo.invoice_phone}</p>}
                    {companyInfo.invoice_trn && <p className="text-xs font-mono mt-1">TRN: {companyInfo.invoice_trn}</p>}
                  </div>
                  <div className="text-right">
                    <h4 className="text-2xl font-bold text-base-content/20">INVOICE</h4>
                    <p className="text-xs text-base-content/40">INV-2026-XXX</p>
                    <p className="text-xs text-base-content/40">{new Date().toLocaleDateString('en-GB')}</p>
                  </div>
                </div>
                {/* Bill To */}
                <div className="mb-4">
                  <p className="text-[10px] uppercase font-semibold text-base-content/40 mb-1">Bill To</p>
                  <p className="font-semibold text-sm">Sample Tenant Corp</p>
                  <p className="text-xs text-base-content/50">tenant@example.com</p>
                </div>
                {/* Line Items */}
                <table className="table table-sm mb-4">
                  <thead>
                    <tr className="bg-base-200/30">
                      <th className="text-xs">Description</th>
                      <th className="text-xs text-right">Amount</th>
                    </tr>
                  </thead>
                  <tbody>
                    <tr>
                      <td className="text-xs">Professional Plan — Monthly Subscription</td>
                      <td className="text-xs text-right font-mono">{formatCurrency(pricing.find(p => p.plan === 'professional' && p.currency === activeCurrency)?.price_monthly || 499)}</td>
                    </tr>
                  </tbody>
                </table>
                {/* Totals */}
                <div className="flex justify-end">
                  <div className="w-48 space-y-1">
                    <div className="flex justify-between text-xs">
                      <span>Subtotal</span>
                      <span className="font-mono">{formatCurrency(pricing.find(p => p.plan === 'professional' && p.currency === activeCurrency)?.price_monthly || 499)}</span>
                    </div>
                    {taxes.filter(t => t.enabled && t.applies_to_currency === activeCurrency).map(t => {
                      const base = pricing.find(p => p.plan === 'professional' && p.currency === activeCurrency)?.price_monthly || 499;
                      return (
                        <div key={t.id} className="flex justify-between text-xs">
                          <span>{t.tax_name} ({t.tax_rate}%)</span>
                          <span className="font-mono">{formatCurrency(base * t.tax_rate / 100)}</span>
                        </div>
                      );
                    })}
                    <div className="flex justify-between text-sm font-bold border-t border-base-200 pt-1">
                      <span>Total</span>
                      <span className="font-mono">{(() => {
                        const base = pricing.find(p => p.plan === 'professional' && p.currency === activeCurrency)?.price_monthly || 499;
                        const taxTotal = taxes.filter(t => t.enabled && t.applies_to_currency === activeCurrency).reduce((s, t) => s + base * t.tax_rate / 100, 0);
                        return formatCurrency(base + taxTotal);
                      })()}</span>
                    </div>
                  </div>
                </div>
                {/* Footer */}
                {companyInfo.invoice_footer && (
                  <div className="mt-4 pt-3 border-t border-base-200">
                    <p className="text-xs text-base-content/40 italic">{companyInfo.invoice_footer}</p>
                  </div>
                )}
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
};


// ════════════════════ CompanySettings.tsx ════════════════════

interface Props { currentUser: AppUser; }

interface SettingsMap { [key: string]: string; }

const SETTING_FIELDS = [
  { key: 'company_name', label: 'Company Name', icon: <Building2 size={15} />, group: 'Company' },
  { key: 'company_tagline', label: 'Company Tagline', icon: <Building2 size={15} />, group: 'Company' },
  { key: 'currency', label: 'Currency Code', icon: <DollarSign size={15} />, group: 'Company' },
  { key: 'timezone', label: 'Timezone', icon: <Clock size={15} />, group: 'Company' },
  { key: 'fiscal_year_start', label: 'Fiscal Year Start (Month)', icon: <Calendar size={15} />, group: 'Policies' },
  { key: 'work_hours_start', label: 'Work Hours Start', icon: <Clock size={15} />, group: 'Policies' },
  { key: 'work_hours_end', label: 'Work Hours End', icon: <Clock size={15} />, group: 'Policies' },
  { key: 'annual_leave_quota', label: 'Annual Leave Days', icon: <Calendar size={15} />, group: 'Policies' },
  { key: 'sick_leave_quota', label: 'Sick Leave Days', icon: <Calendar size={15} />, group: 'Policies' },
  { key: 'probation_months', label: 'Probation Period (Months)', icon: <Calendar size={15} />, group: 'Policies' },
];

const CompanySettings: React.FC<Props> = ({ currentUser }) => {
  const [settings, setSettings] = useState<SettingsMap>({});
  const [saved, setSaved] = useState(false);
  const [saving, setSaving] = useState(false);

  useEffect(() => { load(); }, []);

  async function load() {
    const rows = await window.tasklet.sqlQuery('SELECT key, value FROM hr_company_settings') as { key: string; value: string }[];
    const map: SettingsMap = {};
    rows.forEach(r => { map[r.key] = r.value; });
    setSettings(map);
  }

  async function handleSave() {
    setSaving(true);
    const { sqlExec } = window.tasklet;
    for (const [key, value] of Object.entries(settings)) {
      await sqlExec(`INSERT OR REPLACE INTO hr_company_settings (key, value) VALUES ('${escapeSql(key)}', '${escapeSql(String(value))}')`);
    }
    // Sync active currency globally
    if (settings.currency) setActiveCurrency(settings.currency as SupportedCurrency);
    await logAudit(currentUser.id, 'update_settings', 'settings', 0, 'Updated company settings');
    setSaving(false);
    setSaved(true);
    setTimeout(() => setSaved(false), 2000);
  }

  const isReadOnly = currentUser.role !== 'admin' && currentUser.role !== 'hr_manager';
  const groups = [...new Set(SETTING_FIELDS.map(f => f.group))];

  return (
    <div className="p-4 sm:p-6 space-y-5 overflow-auto h-full">
      <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-3">
        <div className="page-header">
          <div className="page-header-icon bg-primary/10 text-primary"><Settings size={18} /></div>
          <div>
            <h2 className="text-lg font-bold tracking-tight">Company Settings</h2>
            <p className="text-xs text-base-content/40">Configure your organization</p>
          </div>
        </div>
        {!isReadOnly && (
          <button className={`btn btn-primary btn-sm w-full sm:w-auto ${saving ? 'loading' : ''}`} onClick={handleSave} disabled={saving}>
            {saved ? <Check size={16} /> : saving ? <span className="loading loading-spinner loading-sm" /> : <Save size={16} />}
            {saved ? 'Saved!' : 'Save Changes'}
          </button>
        )}
      </div>

      {isReadOnly && (
        <div className="alert alert-info py-2 text-sm">
          <span>You have read-only access to settings. Contact an administrator to make changes.</span>
        </div>
      )}

      {groups.map(group => (
        <div key={group} className="pro-card p-4 sm:p-5">
          <h3 className="font-semibold text-sm mb-4 flex items-center gap-2">
            {group === 'Company' ? <Building2 size={15} className="text-primary" /> : <Calendar size={15} className="text-primary" />}
            {group} Information
          </h3>
          <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
            {SETTING_FIELDS.filter(f => f.group === group).map(field => (
              <div key={field.key}>
                <label className="label"><span className="label-text text-xs font-medium">{field.label}</span></label>
                {field.key === 'currency' ? (
                  <select
                    className="select select-bordered select-sm w-full"
                    value={settings.currency || 'AED'}
                    onChange={(e) => setSettings({ ...settings, currency: e.target.value })}
                    disabled={isReadOnly}
                  >
                    <option value="AED">🇦🇪 AED — UAE Dirham</option>
                    <option value="USD">🇺🇸 USD — US Dollar</option>
                    <option value="INR">🇮🇳 INR — Indian Rupee</option>
                  </select>
                ) : (
                  <input
                    className="input input-bordered input-sm w-full"
                    value={settings[field.key] || ''}
                    onChange={(e) => setSettings({ ...settings, [field.key]: e.target.value })}
                    disabled={isReadOnly}
                  />
                )}
              </div>
            ))}
          </div>
        </div>
      ))}

      {/* User Accounts Summary */}
      <div className="pro-card p-4 sm:p-5">
        <h3 className="font-semibold text-sm mb-3 flex items-center gap-2">
          <Settings size={15} className="text-primary" />
          System Information
        </h3>
        <div className="grid grid-cols-2 sm:grid-cols-4 gap-3 text-sm">
          <div className="bg-base-100 rounded-lg p-3">
            <p className="text-[10px] text-base-content/40 uppercase font-semibold">Version</p>
            <p className="font-bold">v3.0 SaaS</p>
          </div>
          <div className="bg-base-100 rounded-lg p-3">
            <p className="text-[10px] text-base-content/40 uppercase font-semibold">Currency</p>
            <p className="font-bold">{settings.currency || 'AED'}</p>
          </div>
          <div className="bg-base-100 rounded-lg p-3">
            <p className="text-[10px] text-base-content/40 uppercase font-semibold">Timezone</p>
            <p className="font-bold text-xs">{settings.timezone || 'Asia/Dubai'}</p>
          </div>
          <div className="bg-base-100 rounded-lg p-3">
            <p className="text-[10px] text-base-content/40 uppercase font-semibold">Logged in as</p>
            <p className="font-bold text-xs">{currentUser.display_name}</p>
          </div>
        </div>
      </div>
    </div>
  );
};


// ════════════════════ Tenants.tsx ════════════════════

interface TenantsProps {
  currentUser: AppUser;
}

const planColors: Record<PlanTier, string> = {
  free: 'badge-ghost',
  starter: 'badge-info',
  professional: 'badge-primary',
  enterprise: 'badge-warning',
};
const statusColors: Record<string, string> = {
  active: 'badge-success',
  suspended: 'badge-error',
  trial: 'badge-info',
};

const Tenants: React.FC<TenantsProps> = ({ currentUser }) => {
  const [tenants, setTenants] = useState<Tenant[]>([]);
  const [search, setSearch] = useState('');
  const [filterPlan, setFilterPlan] = useState('all');
  const [filterStatus, setFilterStatus] = useState('all');
  const [showModal, setShowModal] = useState(false);
  const [viewTenant, setViewTenant] = useState<Tenant | null>(null);
  const [editTenant, setEditTenant] = useState<Tenant | null>(null);
  const [loading, setLoading] = useState(true);
  const [form, setForm] = useState({ name: '', domain: '', plan: 'free' as PlanTier, status: 'active', employee_limit: 10, admin_name: '', admin_email: '' });

  useEffect(() => { loadData(); }, []);

  async function loadData() {
    const { sqlQuery } = window.tasklet;
    const rows = await sqlQuery(`
      SELECT t.*, (SELECT COUNT(*) FROM hr_employees WHERE status='active') as employee_count
      FROM hr_tenants t ORDER BY t.created_at DESC
    `);
    setTenants(rows as unknown as Tenant[]);
    setLoading(false);
  }

  const planLimits: Record<PlanTier, number> = { free: 10, starter: 25, professional: 50, enterprise: 100 };

  function openAdd() {
    setForm({ name: '', domain: '', plan: 'free', status: 'active', employee_limit: 10, admin_name: '', admin_email: '' });
    setEditTenant(null);
    setShowModal(true);
  }

  function openEdit(t: Tenant) {
    setForm({ name: t.name, domain: t.domain, plan: t.plan, status: t.status, employee_limit: t.employee_limit, admin_name: t.admin_name, admin_email: t.admin_email });
    setEditTenant(t);
    setShowModal(true);
  }

  async function handleSave() {
    const { sqlExec } = window.tasklet;
    if (!form.name.trim() || !form.admin_email.trim()) return;
    const limit = planLimits[form.plan] || form.employee_limit;
    if (editTenant) {
      await sqlExec(`UPDATE hr_tenants SET name='${escapeSql(form.name)}', domain='${escapeSql(form.domain)}', plan='${form.plan}', status='${form.status}', employee_limit=${limit}, admin_name='${escapeSql(form.admin_name)}', admin_email='${escapeSql(form.admin_email)}' WHERE id=${editTenant.id}`);
      await sqlExec(`INSERT INTO hr_audit_log (user_id, action, entity_type, entity_id, details) VALUES (${currentUser.id}, 'update_tenant', 'tenant', ${editTenant.id}, 'Updated tenant: ${escapeSql(form.name)}')`);
    } else {
      await sqlExec(`INSERT INTO hr_tenants (name, domain, plan, status, employee_limit, admin_name, admin_email) VALUES ('${escapeSql(form.name)}', '${escapeSql(form.domain)}', '${form.plan}', '${form.status}', ${limit}, '${escapeSql(form.admin_name)}', '${escapeSql(form.admin_email)}')`);
      await sqlExec(`INSERT INTO hr_audit_log (user_id, action, entity_type, entity_id, details) VALUES (${currentUser.id}, 'create_tenant', 'tenant', 0, 'Created tenant: ${escapeSql(form.name)}')`);
    }
    setShowModal(false);
    loadData();
  }

  async function handleDelete(id: number) {
    if (!confirm('Delete this tenant? This action cannot be undone.')) return;
    const { sqlExec } = window.tasklet;
    await sqlExec(`DELETE FROM hr_tenants WHERE id=${id}`);
    await sqlExec(`INSERT INTO hr_audit_log (user_id, action, entity_type, entity_id, details) VALUES (${currentUser.id}, 'delete_tenant', 'tenant', ${id}, 'Deleted tenant')`);
    loadData();
  }

  const filtered = tenants.filter(t => {
    if (search && !t.name.toLowerCase().includes(search.toLowerCase()) && !t.domain.toLowerCase().includes(search.toLowerCase())) return false;
    if (filterPlan !== 'all' && t.plan !== filterPlan) return false;
    if (filterStatus !== 'all' && t.status !== filterStatus) return false;
    return true;
  });

  if (loading) return <div className="flex items-center justify-center h-64"><span className="loading loading-dots loading-md text-primary" /></div>;

  return (
    <div className="h-full overflow-y-auto">
      <div className="p-4 md:p-6 space-y-5">
        {/* Header */}
        <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-3">
          <div className="page-header">
            <div className="page-header-icon bg-warning/15 text-warning"><Building2 size={18} /></div>
            <div>
              <h1 className="text-lg font-bold">Tenant Management</h1>
              <p className="text-xs text-base-content/50">Manage all organizations on the platform</p>
            </div>
          </div>
          <button className="btn btn-primary btn-sm gap-1.5" onClick={openAdd}>
            <Plus size={15} /> Add Tenant
          </button>
        </div>

        {/* Stats */}
        <div className="grid grid-cols-2 sm:grid-cols-4 gap-3">
          <div className="pro-card p-3 border-l-4 border-l-primary">
            <p className="text-xs text-base-content/50">Total Tenants</p>
            <p className="text-xl font-bold">{tenants.length}</p>
          </div>
          <div className="pro-card p-3 border-l-4 border-l-success">
            <p className="text-xs text-base-content/50">Active</p>
            <p className="text-xl font-bold">{tenants.filter(t => t.status === 'active').length}</p>
          </div>
          <div className="pro-card p-3 border-l-4 border-l-info">
            <p className="text-xs text-base-content/50">Trial</p>
            <p className="text-xl font-bold">{tenants.filter(t => t.status === 'trial').length}</p>
          </div>
          <div className="pro-card p-3 border-l-4 border-l-warning">
            <p className="text-xs text-base-content/50">Paid Plans</p>
            <p className="text-xl font-bold">{tenants.filter(t => t.plan !== 'free').length}</p>
          </div>
        </div>

        {/* Filters */}
        <div className="flex flex-col sm:flex-row gap-2">
          <label className="input input-bordered input-sm flex items-center gap-2 flex-1">
            <Search size={14} className="text-base-content/40" />
            <input type="search" className="grow" placeholder="Search tenants..." value={search} onChange={e => setSearch(e.target.value)} />
          </label>
          <select className="select select-bordered select-sm" value={filterPlan} onChange={e => setFilterPlan(e.target.value)}>
            <option value="all">All Plans</option>
            <option value="free">Free</option>
            <option value="starter">Starter</option>
            <option value="professional">Professional</option>
            <option value="enterprise">Enterprise</option>
          </select>
          <select className="select select-bordered select-sm" value={filterStatus} onChange={e => setFilterStatus(e.target.value)}>
            <option value="all">All Status</option>
            <option value="active">Active</option>
            <option value="trial">Trial</option>
            <option value="suspended">Suspended</option>
          </select>
        </div>

        {/* Tenant Cards */}
        <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
          {filtered.map(t => (
            <div key={t.id} className="pro-card p-4 space-y-3">
              <div className="flex items-start justify-between">
                <div className="flex items-center gap-3">
                  <div className="w-10 h-10 rounded-lg bg-primary/10 flex items-center justify-center">
                    <span className="font-bold text-sm text-primary">{t.name.slice(0, 2).toUpperCase()}</span>
                  </div>
                  <div>
                    <h3 className="font-semibold text-sm">{t.name}</h3>
                    <p className="text-[11px] text-base-content/40 flex items-center gap-1"><Globe size={10} />{t.domain || 'No domain'}</p>
                  </div>
                </div>
                <span className={`badge badge-xs ${statusColors[t.status] || 'badge-ghost'}`}>
                  {t.status === 'active' && <CheckCircle size={9} className="mr-0.5" />}
                  {t.status === 'suspended' && <Pause size={9} className="mr-0.5" />}
                  {t.status}
                </span>
              </div>

              <div className="grid grid-cols-3 gap-2 text-center bg-base-200/50 rounded-lg p-2">
                <div>
                  <p className="text-[10px] text-base-content/40">Plan</p>
                  <span className={`badge badge-xs ${planColors[t.plan]}`}>{t.plan}</span>
                </div>
                <div>
                  <p className="text-[10px] text-base-content/40">Limit</p>
                  <p className="text-xs font-semibold">{t.employee_limit}</p>
                </div>
                <div>
                  <p className="text-[10px] text-base-content/40">Admin</p>
                  <p className="text-xs font-medium truncate">{t.admin_name.split(' ')[0]}</p>
                </div>
              </div>

              <div className="flex items-center justify-between pt-1">
                <span className="text-[10px] text-base-content/30">Since {formatDate(t.created_at)}</span>
                <div className="flex gap-1">
                  <button className="btn btn-ghost btn-xs btn-square" onClick={() => setViewTenant(t)} title="View"><Eye size={13} /></button>
                  <button className="btn btn-ghost btn-xs btn-square" onClick={() => openEdit(t)} title="Edit"><Edit2 size={13} /></button>
                  <button className="btn btn-ghost btn-xs btn-square text-error" onClick={() => handleDelete(t.id)} title="Delete"><Trash2 size={13} /></button>
                </div>
              </div>
            </div>
          ))}
        </div>

        {filtered.length === 0 && (
          <div className="text-center py-12">
            <Building2 size={40} className="mx-auto text-base-content/20 mb-3" />
            <p className="text-sm text-base-content/40">No tenants found</p>
          </div>
        )}
      </div>

      {/* View Modal */}
      {viewTenant && (
        <div className="modal modal-open">
          <div className="modal-box max-w-lg">
            <div className="flex items-center justify-between mb-4">
              <h3 className="font-bold text-lg">{viewTenant.name}</h3>
              <button className="btn btn-ghost btn-xs btn-square" onClick={() => setViewTenant(null)}><X size={16} /></button>
            </div>
            <div className="space-y-3">
              <div className="grid grid-cols-2 gap-3">
                {[
                  ['Domain', viewTenant.domain || '—'],
                  ['Plan', viewTenant.plan.charAt(0).toUpperCase() + viewTenant.plan.slice(1)],
                  ['Status', viewTenant.status],
                  ['Employee Limit', String(viewTenant.employee_limit)],
                  ['Admin', viewTenant.admin_name],
                  ['Admin Email', viewTenant.admin_email],
                  ['Created', formatDate(viewTenant.created_at)],
                ].map(([label, val]) => (
                  <div key={label} className="bg-base-200/50 p-2.5 rounded-lg">
                    <p className="text-[10px] text-base-content/40 uppercase tracking-wider">{label}</p>
                    <p className="text-sm font-medium mt-0.5">{val}</p>
                  </div>
                ))}
              </div>
            </div>
            <div className="modal-action">
              <button className="btn btn-ghost btn-sm" onClick={() => setViewTenant(null)}>Close</button>
              <button className="btn btn-primary btn-sm" onClick={() => { setViewTenant(null); openEdit(viewTenant); }}>Edit</button>
            </div>
          </div>
          <div className="modal-backdrop" onClick={() => setViewTenant(null)} />
        </div>
      )}

      {/* Add/Edit Modal */}
      {showModal && (
        <div className="modal modal-open">
          <div className="modal-box max-w-md">
            <h3 className="font-bold text-lg mb-4">{editTenant ? 'Edit Tenant' : 'Add Tenant'}</h3>
            <div className="space-y-3">
              <div>
                <label className="label"><span className="label-text text-xs">Company Name *</span></label>
                <input className="input input-bordered input-sm w-full" value={form.name} onChange={e => setForm({...form, name: e.target.value})} placeholder="Acme Corp" />
              </div>
              <div>
                <label className="label"><span className="label-text text-xs">Domain</span></label>
                <input className="input input-bordered input-sm w-full" value={form.domain} onChange={e => setForm({...form, domain: e.target.value})} placeholder="acme.com" />
              </div>
              <div className="grid grid-cols-2 gap-3">
                <div>
                  <label className="label"><span className="label-text text-xs">Plan</span></label>
                  <select className="select select-bordered select-sm w-full" value={form.plan} onChange={e => { const p = e.target.value as PlanTier; setForm({...form, plan: p, employee_limit: planLimits[p]}); }}>
                    <option value="free">Free</option>
                    <option value="starter">Starter</option>
                    <option value="professional">Professional</option>
                    <option value="enterprise">Enterprise</option>
                  </select>
                </div>
                <div>
                  <label className="label"><span className="label-text text-xs">Status</span></label>
                  <select className="select select-bordered select-sm w-full" value={form.status} onChange={e => setForm({...form, status: e.target.value})}>
                    <option value="active">Active</option>
                    <option value="trial">Trial</option>
                    <option value="suspended">Suspended</option>
                  </select>
                </div>
              </div>
              <div>
                <label className="label"><span className="label-text text-xs">Admin Name *</span></label>
                <input className="input input-bordered input-sm w-full" value={form.admin_name} onChange={e => setForm({...form, admin_name: e.target.value})} placeholder="John Doe" />
              </div>
              <div>
                <label className="label"><span className="label-text text-xs">Admin Email *</span></label>
                <input className="input input-bordered input-sm w-full" type="email" value={form.admin_email} onChange={e => setForm({...form, admin_email: e.target.value})} placeholder="admin@acme.com" />
              </div>
            </div>
            <div className="modal-action">
              <button className="btn btn-ghost btn-sm" onClick={() => setShowModal(false)}>Cancel</button>
              <button className="btn btn-primary btn-sm" onClick={handleSave} disabled={!form.name.trim() || !form.admin_email.trim()}>
                {editTenant ? 'Save Changes' : 'Create Tenant'}
              </button>
            </div>
          </div>
          <div className="modal-backdrop" onClick={() => setShowModal(false)} />
        </div>
      )}
    </div>
  );
};


// ════════════════════ AuditLog.tsx ════════════════════

const PAGE_SIZE = 15;

const ACTION_BADGES: Record<string, string> = {
  login: 'badge-info',
  logout: 'badge-ghost',
  create_employee: 'badge-success',
  update_employee: 'badge-warning',
  delete_employee: 'badge-error',
  approve_leave: 'badge-success',
  reject_leave: 'badge-error',
  generate_payroll: 'badge-primary',
  process_payroll: 'badge-secondary',
  update_settings: 'badge-warning',
  create_cycle: 'badge-info',
};

const AuditLog: React.FC = () => {
  const [entries, setEntries] = useState<AuditLogEntry[]>([]);
  const [total, setTotal] = useState(0);
  const [page, setPage] = useState(1);
  const [search, setSearch] = useState('');
  const [filterAction, setFilterAction] = useState('all');
  const [actions, setActions] = useState<string[]>([]);

  useEffect(() => { load(); }, [page, search, filterAction]);

  async function load() {
    const { sqlQuery } = window.tasklet;
    let where = '1=1';
    if (search) where += ` AND (a.details LIKE '%${search}%' OR u.display_name LIKE '%${search}%')`;
    if (filterAction !== 'all') where += ` AND a.action = '${filterAction}'`;

    const [rows, countRows, actionRows] = await Promise.all([
      sqlQuery(`SELECT a.*, u.display_name as user_name FROM hr_audit_log a LEFT JOIN hr_users u ON a.user_id = u.id WHERE ${where} ORDER BY a.created_at DESC LIMIT ${PAGE_SIZE} OFFSET ${(page - 1) * PAGE_SIZE}`),
      sqlQuery(`SELECT COUNT(*) as c FROM hr_audit_log a LEFT JOIN hr_users u ON a.user_id = u.id WHERE ${where}`),
      sqlQuery('SELECT DISTINCT action FROM hr_audit_log ORDER BY action'),
    ]);
    setEntries(rows as unknown as AuditLogEntry[]);
    setTotal(Number((countRows[0] as Record<string, unknown>).c));
    setActions(actionRows.map(r => String((r as Record<string, unknown>).action)));
  }

  function handleExport() {
    const headers = ['Date', 'User', 'Action', 'Entity', 'Details'];
    const rows = entries.map(e => [
      e.created_at, e.user_name || 'System', e.action, e.entity_type, e.details
    ]);
    exportCSV(headers, rows, `audit-log-${new Date().toISOString().slice(0, 10)}.csv`);
  }

  const totalPages = Math.ceil(total / PAGE_SIZE);

  return (
    <div className="p-4 sm:p-6 space-y-4 overflow-auto h-full">
      <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-3">
        <div className="page-header">
          <div className="page-header-icon bg-primary/10 text-primary"><FileText size={18} /></div>
          <div>
            <h2 className="text-lg font-bold tracking-tight">Audit Trail</h2>
            <p className="text-xs text-base-content/40">{total} log entries</p>
          </div>
        </div>
        <button className="btn btn-outline btn-sm w-full sm:w-auto" onClick={handleExport}>
          <Download size={14} /> Export CSV
        </button>
      </div>

      <div className="flex flex-col sm:flex-row flex-wrap gap-2">
        <label className="input input-bordered input-sm flex items-center gap-2 w-full sm:w-64">
          <Search className="h-[1em] opacity-50" />
          <input type="search" className="grow" placeholder="Search logs..." value={search} onChange={(e) => { setSearch(e.target.value); setPage(1); }} />
        </label>
        <select className="select select-bordered select-sm w-full sm:w-auto" value={filterAction} onChange={(e) => { setFilterAction(e.target.value); setPage(1); }}>
          <option value="all">All Actions</option>
          {actions.map(a => <option key={a} value={a}>{a.replace(/_/g, ' ')}</option>)}
        </select>
      </div>

      {/* Desktop table */}
      <div className="hidden sm:block overflow-x-auto">
        <table className="table table-sm">
          <thead>
            <tr>
              <th>Timestamp</th>
              <th>User</th>
              <th>Action</th>
              <th>Entity</th>
              <th>Details</th>
            </tr>
          </thead>
          <tbody>
            {entries.map(e => (
              <tr key={e.id}>
                <td className="text-xs text-base-content/60 whitespace-nowrap">{new Date(e.created_at + 'Z').toLocaleString('en-GB', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' })}</td>
                <td className="text-sm font-medium">{e.user_name || 'System'}</td>
                <td><span className={`badge badge-sm ${ACTION_BADGES[e.action] || 'badge-ghost'}`}>{e.action.replace(/_/g, ' ')}</span></td>
                <td className="text-sm capitalize">{e.entity_type}</td>
                <td className="text-xs text-base-content/60 max-w-xs truncate">{e.details}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {/* Mobile cards */}
      <div className="sm:hidden space-y-2">
        {entries.map(e => (
          <div key={e.id} className="pro-card p-3">
            <div className="flex items-start justify-between gap-2">
              <div className="min-w-0 flex-1">
                <div className="flex items-center gap-2 flex-wrap">
                  <span className="font-medium text-sm">{e.user_name || 'System'}</span>
                  <span className={`badge badge-sm ${ACTION_BADGES[e.action] || 'badge-ghost'}`}>{e.action.replace(/_/g, ' ')}</span>
                </div>
                <p className="text-xs text-base-content/50 mt-1 line-clamp-2">{e.details}</p>
              </div>
              <span className="text-[10px] text-base-content/35 whitespace-nowrap shrink-0">
                {new Date(e.created_at + 'Z').toLocaleString('en-GB', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' })}
              </span>
            </div>
          </div>
        ))}
      </div>

      {entries.length === 0 && (
        <div className="text-center py-10">
          <FileText size={36} className="mx-auto text-base-content/15 mb-2" />
          <p className="text-sm text-base-content/40">No audit entries found</p>
        </div>
      )}

      {/* Pagination */}
      {totalPages > 1 && (
        <div className="flex items-center justify-between pt-2">
          <p className="text-xs text-base-content/40">
            Page {page} of {totalPages} · {total} entries
          </p>
          <div className="join">
            <button className="join-item btn btn-sm btn-ghost" disabled={page <= 1} onClick={() => setPage(page - 1)}>
              <ChevronLeft size={14} />
            </button>
            <button className="join-item btn btn-sm btn-ghost" disabled={page >= totalPages} onClick={() => setPage(page + 1)}>
              <ChevronRight size={14} />
            </button>
          </div>
        </div>
      )}
    </div>
  );
};


const FeedbackWidget: React.FC = () => {
  const [open, setOpen] = useState(false);
  const [feedback, setFeedback] = useState('');
  const [rating, setRating] = useState(0);
  const [module, setModule] = useState('overall');
  const [submitted, setSubmitted] = useState(false);
  const [feedbackList, setFeedbackList] = useState<any[]>([]);

  useEffect(() => {
    const saved = localStorage.getItem('hr_beta_feedback');
    if (saved) setFeedbackList(JSON.parse(saved));
  }, []);

  function handleSubmit() {
    if (!feedback.trim() && !rating) return;
    const entry = {
      id: Date.now(), rating, module, feedback: feedback.trim(),
      timestamp: new Date().toISOString(),
      userAgent: navigator.userAgent.slice(0, 100)
    };
    const updated = [...feedbackList, entry];
    setFeedbackList(updated);
    localStorage.setItem('hr_beta_feedback', JSON.stringify(updated));
    setSubmitted(true);
    setTimeout(() => { setSubmitted(false); setFeedback(''); setRating(0); setModule('overall'); setOpen(false); }, 2000);
  }

  function exportFeedback() {
    const data = JSON.stringify(feedbackList, null, 2);
    const blob = new Blob([data], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = 'beta-feedback.json'; a.click();
    URL.revokeObjectURL(url);
  }

  return (
    <div style={{position:'fixed',bottom:20,right:20,zIndex:9999}}>
      {!open ? (
        <button onClick={() => setOpen(true)} className="btn btn-primary btn-circle shadow-xl text-lg" title="Send Feedback">
          💬
        </button>
      ) : (
        <div className="card bg-base-100 shadow-2xl w-80 border border-base-300">
          <div className="card-body p-4 space-y-3">
            <div className="flex justify-between items-center">
              <h3 className="font-bold text-lg">Beta Feedback</h3>
              <button onClick={() => setOpen(false)} className="btn btn-ghost btn-sm btn-circle">✕</button>
            </div>
            {submitted ? (
              <div className="text-center py-6">
                <div className="text-4xl mb-2">🎉</div>
                <p className="font-semibold text-success">Thank you for your feedback!</p>
              </div>
            ) : (
              <>
                <div>
                  <label className="label text-sm font-medium">Module</label>
                  <select className="select select-bordered select-sm w-full" value={module} onChange={e => setModule(e.target.value)}>
                    <option value="overall">Overall Experience</option>
                    <option value="onboarding">Signup & Onboarding</option>
                    <option value="dashboard">Dashboard</option>
                    <option value="employees">Employee Management</option>
                    <option value="payroll">Payroll</option>
                    <option value="attendance">Attendance</option>
                    <option value="leaves">Leave Management</option>
                    <option value="training">Training & Development</option>
                    <option value="talent">Talent Acquisition</option>
                    <option value="appraisals">Appraisals</option>
                    <option value="billing">Billing & Subscription</option>
                    <option value="reports">Reports</option>
                    <option value="settings">Settings</option>
                    <option value="ui_ux">UI/UX Design</option>
                    <option value="mobile">Mobile Experience</option>
                  </select>
                </div>
                <div>
                  <label className="label text-sm font-medium">Rating</label>
                  <div className="flex gap-1">
                    {[1,2,3,4,5].map(n => (
                      <button key={n} onClick={() => setRating(n)} className={`btn btn-sm ${rating >= n ? 'btn-warning' : 'btn-ghost'}`}>⭐</button>
                    ))}
                  </div>
                </div>
                <div>
                  <label className="label text-sm font-medium">Your Feedback</label>
                  <textarea className="textarea textarea-bordered w-full h-20 text-sm" placeholder="What works well? What needs improvement?" value={feedback} onChange={e => setFeedback(e.target.value)} />
                </div>
                <button onClick={handleSubmit} className="btn btn-primary btn-sm w-full">Submit Feedback</button>
                {feedbackList.length > 0 && (
                  <div className="text-center">
                    <button onClick={exportFeedback} className="btn btn-ghost btn-xs">📥 Export All Feedback ({feedbackList.length})</button>
                  </div>
                )}
              </>
            )}
          </div>
        </div>
      )}
    </div>
  );
};


const App: React.FC = () => {
  const [page, setPage] = useState<Page>('dashboard');
  const [ready, setReady] = useState(false);
  const [sidebarOpen, setSidebarOpen] = useState(false);
  const [currentUser, setCurrentUser] = useState<AppUser | null>(null);
  const [authScreen, setAuthScreen] = useState<AuthScreen>('login');
  const [signupData, setSignupData] = useState<SignupData | null>(null);

  useEffect(() => {
    initDatabase().then(async () => {
      // Load currency from company settings
      try {
        const rows = await window.tasklet.sqlQuery("SELECT value FROM hr_company_settings WHERE key = 'currency'") as { value: string }[];
        if (rows.length > 0 && rows[0].value) {
          setActiveCurrency(rows[0].value as SupportedCurrency);
        }
      } catch (_) { /* default AED */ }
      setReady(true);
    }).catch((err) => {
      console.error('Failed to initialize database:', err);
    });
  }, []);

  if (!ready) {
    return (
      <div className="flex items-center justify-center h-screen bg-base-100">
        <div className="text-center space-y-4">
          <div className="w-14 h-14 rounded-xl bg-primary flex items-center justify-center mx-auto shadow-md">
            <Shield size={28} className="text-primary-content" />
          </div>
          <div className="space-y-1">
            <p className="font-semibold text-sm">HR & Payroll Manager</p>
            <p className="text-xs text-base-content/40">Setting up your workspace...</p>
          </div>
          <span className="loading loading-dots loading-sm text-primary" />
        </div>
      </div>
    );
  }

  // Auth flow: login → signup → onboarding → dashboard
  if (!currentUser) {
    if (authScreen === 'signup') {
      return (
        <Signup
          onBack={() => setAuthScreen('login')}
          onSignupComplete={(data) => {
            setSignupData(data);
            setAuthScreen('onboarding');
          }}
        />
      );
    }

    if (authScreen === 'onboarding' && signupData) {
      return (
        <OnboardingWizard
          signupData={signupData}
          onComplete={(user) => {
            setCurrentUser(user);
            setPage('dashboard');
            setAuthScreen('login');
            setSignupData(null);
          }}
        />
      );
    }

    // Default: Login screen
    return (
      <Login
        onLogin={(user) => {
          setCurrentUser(user);
          if (user.role === 'employee') {
            setPage('my_dashboard');
          } else {
            setPage('dashboard');
          }
        }}
        onSignup={() => setAuthScreen('signup')}
      />
    );
  }

  const handleNavigate = (p: Page) => {
    setPage(p);
    setSidebarOpen(false);
  };

  const handleLogout = () => {
    setCurrentUser(null);
    setPage('dashboard');
  };

  const renderPage = () => {
    switch (page) {
      case 'dashboard': return <Dashboard currentUser={currentUser} />;
      case 'my_dashboard': return <MyDashboard currentUser={currentUser} />;
      case 'employees': return <Employees />;
      case 'departments': return <Departments />;
      case 'payroll': return <Payroll />;
      case 'attendance': return <Attendance />;
      case 'leaves': return <Leaves />;
      case 'reports': return <Reports />;
      case 'training': return <Training />;
      case 'talent': return <TalentAcquisition />;
      case 'appraisals': return <Appraisals />;
      case 'settings': return <CompanySettings currentUser={currentUser} />;
      case 'billing': return <Billing currentUser={currentUser} />;
      case 'tenants': return <Tenants currentUser={currentUser} />;
      case 'pricing_tax': return <PricingTax currentUser={currentUser} />;
      case 'audit_log': return <AuditLog />;
    }
  };

  return (
    <div className="flex h-screen bg-base-100 text-base-content overflow-hidden">
      {/* Mobile overlay */}
      {sidebarOpen && (
        <div
          className="fixed inset-0 bg-black/40 z-30 lg:hidden"
          onClick={() => setSidebarOpen(false)}
        />
      )}
      <Sidebar
        currentPage={page}
        onNavigate={handleNavigate}
        mobileOpen={sidebarOpen}
        onClose={() => setSidebarOpen(false)}
        currentUser={currentUser}
        onLogout={handleLogout}
      />
      <main className="flex-1 overflow-hidden flex flex-col min-w-0">
        {/* Mobile top bar */}
        <div className="lg:hidden flex items-center gap-3 px-4 py-3 border-b border-base-300 bg-base-200 shrink-0">
          <button className="btn btn-ghost btn-sm btn-square" onClick={() => setSidebarOpen(true)}>
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          </button>
          <div className="flex items-center gap-2 flex-1 min-w-0">
            <div className="w-7 h-7 rounded-lg bg-primary flex items-center justify-center shrink-0">
              <Shield size={14} className="text-primary-content" />
            </div>
            <span className="font-bold text-sm truncate">HR & Payroll</span>
          </div>
          <div className="flex items-center gap-1">
            <div className="w-7 h-7 rounded-full bg-primary/15 flex items-center justify-center">
              <span className="text-[10px] font-bold text-primary">{currentUser.display_name.split(' ').map(n => n[0]).join('')}</span>
            </div>
          </div>
        </div>
        <div className="flex-1 overflow-hidden">
          {renderPage()}
        </div>
      </main>
    </div>
  );
};

    // Bootstrap

    async function bootstrap() {
      await _initSqlJs();
      await initDatabase();

      // Load currency setting
      try {
        const settings = await window.tasklet.sqlQuery("SELECT value FROM hr_company_settings WHERE key = 'currency'");
        if (settings.length > 0) setActiveCurrency(settings[0].value as any);
      } catch(e) {}

      const BetaApp = () => (
        <>
          <App />
          <FeedbackWidget />
        </>
      );
      const root = ReactDOM.createRoot(document.getElementById('root')!);
      root.render(<BetaApp />);
    }
    bootstrap().catch(err => {
      document.getElementById('root')!.innerHTML = `
        <div style="padding:40px;text-align:center;">
          <h2 style="color:red;margin-bottom:16px;">Failed to load app</h2>
          <p>${err.message}</p>
          <button onclick="localStorage.clear();location.reload()" style="margin-top:20px;padding:8px 16px;background:#3b82f6;color:white;border:none;border-radius:6px;cursor:pointer;">Reset & Reload</button>
        </div>`;
      console.error(err);
    });

  </script>
