// ════════════════════ Reports.tsx ════════════════════

interface DeptSummary { name: string; count: number; total_salary: number; avg_salary: number; budget: number; }
interface PayrollSummary { month: string; total_net: number; total_basic: number; total_allowances: number; total_deductions: number; emp_count: number; }
interface LeaveSummary { leave_type: string; total: number; approved: number; pending: number; rejected: number; total_days: number; }
interface AttSummary { status: string; count: number; }
interface HeadcountTrend { month: string; count: number; }
interface TrainingSummary { category: string; programs: number; enrolled: number; completed: number; avg_score: number; }

type ReportTab = 'workforce' | 'payroll' | 'leave' | 'attendance' | 'training';

const Reports: React.FC = () => {
  const [tab, setTab] = useState<ReportTab>('workforce');
  const [deptData, setDeptData] = useState<DeptSummary[]>([]);
  const [payrollData, setPayrollData] = useState<PayrollSummary[]>([]);
  const [leaveData, setLeaveData] = useState<LeaveSummary[]>([]);
  const [attData, setAttData] = useState<AttSummary[]>([]);
  const [headcount, setHeadcount] = useState<HeadcountTrend[]>([]);
  const [trainingData, setTrainingData] = useState<TrainingSummary[]>([]);
  const [totalEmp, setTotalEmp] = useState(0);
  const [totalPayroll, setTotalPayroll] = useState(0);
  const [avgSalary, setAvgSalary] = useState(0);
  const [loading, setLoading] = useState(true);

  const loadData = async () => {
    setLoading(true);
    const { sqlQuery } = window.tasklet;

    const [dept, payroll, leave, att, empStats, training] = await Promise.all([
      sqlQuery(`SELECT d.name, COUNT(e.id) as count, COALESCE(SUM(e.salary),0) as total_salary, COALESCE(AVG(e.salary),0) as avg_salary, d.budget FROM hr_departments d LEFT JOIN hr_employees e ON e.department_id = d.id AND e.status='active' GROUP BY d.id ORDER BY count DESC`),
      sqlQuery(`SELECT month, SUM(net_salary) as total_net, SUM(basic_salary) as total_basic, SUM(allowances) as total_allowances, SUM(deductions) as total_deductions, COUNT(*) as emp_count FROM hr_payroll GROUP BY month ORDER BY month DESC LIMIT 6`),
      sqlQuery(`SELECT leave_type, COUNT(*) as total, SUM(CASE WHEN status='approved' THEN 1 ELSE 0 END) as approved, SUM(CASE WHEN status='pending' THEN 1 ELSE 0 END) as pending, SUM(CASE WHEN status='rejected' THEN 1 ELSE 0 END) as rejected, SUM(days) as total_days FROM hr_leaves GROUP BY leave_type`),
      sqlQuery(`SELECT status, COUNT(*) as count FROM hr_attendance GROUP BY status`),
      sqlQuery(`SELECT COUNT(*) as total, COALESCE(AVG(salary),0) as avg, COALESCE(SUM(salary),0) as payroll FROM hr_employees WHERE status='active'`),
      sqlQuery(`SELECT tp.category, COUNT(DISTINCT tp.id) as programs, COUNT(te.id) as enrolled, SUM(CASE WHEN te.status='completed' THEN 1 ELSE 0 END) as completed, COALESCE(AVG(CASE WHEN te.score > 0 THEN te.score END), 0) as avg_score FROM hr_training_programs tp LEFT JOIN hr_training_enrollments te ON te.program_id = tp.id GROUP BY tp.category`),
    ]);

    setDeptData(dept as unknown as DeptSummary[]);
    setPayrollData(payroll as unknown as PayrollSummary[]);
    setLeaveData(leave as unknown as LeaveSummary[]);
    setAttData(att as unknown as AttSummary[]);
    setTrainingData(training as unknown as TrainingSummary[]);

    const stats = empStats[0] as Record<string, number>;
    setTotalEmp(stats.total);
    setTotalPayroll(stats.payroll);
    setAvgSalary(stats.avg);

    // Simulated headcount trend
    const months: HeadcountTrend[] = [];
    const base = stats.total;
    for (let i = 5; i >= 0; i--) {
      const d = new Date();
      d.setMonth(d.getMonth() - i);
      months.push({ month: d.toISOString().slice(0, 7), count: Math.max(1, base - i * 2 + Math.floor(Math.random() * 3)) });
    }
    setHeadcount(months);
    setLoading(false);
  };

  useEffect(() => { loadData(); }, []);

  const maxBar = (arr: number[]) => Math.max(...arr, 1);

  const tabs: { id: ReportTab; label: string; icon: React.ReactNode }[] = [
    { id: 'workforce', label: 'Workforce', icon: <Users size={15} /> },
    { id: 'payroll', label: 'Payroll', icon: <Wallet size={15} /> },
    { id: 'leave', label: 'Leave', icon: <CalendarOff size={15} /> },
    { id: 'attendance', label: 'Attendance', icon: <TrendingUp size={15} /> },
    { id: 'training', label: 'Training', icon: <GraduationCap size={15} /> },
  ];

  if (loading) return <div className="flex items-center justify-center h-full"><span className="loading loading-spinner loading-lg text-primary" /></div>;

  return (
    <div className="h-full flex flex-col overflow-hidden">
      <div className="p-4 pb-2 flex flex-col sm:flex-row sm:items-center justify-between gap-3">
        <div className="page-header">
          <div className="page-header-icon bg-primary/10 text-primary">
            <BarChart3 size={18} />
          </div>
          <div>
            <h2 className="text-lg font-bold tracking-tight">Reports & Analytics</h2>
            <p className="text-xs text-base-content/40">Workforce insights & metrics</p>
          </div>
        </div>
        <button className="btn btn-ghost btn-sm" onClick={loadData}><RefreshCw size={14} /> Refresh</button>
      </div>

      {/* Summary cards */}
      <div className="px-4 grid grid-cols-2 sm:grid-cols-4 gap-3 mb-3">
        <div className="stat-card p-3 sm:p-4">
          <p className="text-[11px] font-semibold text-base-content/45 uppercase tracking-wide">Total Employees</p>
          <p className="text-xl font-bold mt-1">{totalEmp}</p>
        </div>
        <div className="stat-card stat-warning p-3 sm:p-4">
          <p className="text-[11px] font-semibold text-base-content/45 uppercase tracking-wide">Monthly Payroll</p>
          <p className="text-xl font-bold mt-1">{formatCurrency(totalPayroll)}</p>
        </div>
        <div className="stat-card stat-info p-3 sm:p-4">
          <p className="text-[11px] font-semibold text-base-content/45 uppercase tracking-wide">Avg Salary</p>
          <p className="text-xl font-bold mt-1">{formatCurrency(avgSalary)}</p>
        </div>
        <div className="stat-card stat-secondary p-3 sm:p-4">
          <p className="text-[11px] font-semibold text-base-content/45 uppercase tracking-wide">Departments</p>
          <p className="text-xl font-bold mt-1">{deptData.length}</p>
        </div>
      </div>

      {/* Tabs */}
      <div className="px-4 overflow-x-auto">
        <div className="tabs tabs-bordered min-w-max">
          {tabs.map(t => (
            <button key={t.id} className={`tab tab-sm gap-1 ${tab === t.id ? 'tab-active' : ''}`} onClick={() => setTab(t.id)}>
              {t.icon} {t.label}
            </button>
          ))}
        </div>
      </div>

      <div className="flex-1 overflow-y-auto p-4 pt-3">
        {tab === 'workforce' && (
          <div className="space-y-4">
            <div className="pro-card p-4">
              <h3 className="font-semibold text-sm flex items-center gap-2 mb-3">
                <Building2 size={15} className="text-primary" /> Department Breakdown
              </h3>
              <div className="overflow-x-auto">
                <table className="table table-sm">
                  <thead><tr><th>Department</th><th>Headcount</th><th>Avg Salary</th><th>Total Salary</th><th>Budget</th><th>Utilization</th></tr></thead>
                  <tbody>
                    {deptData.map(d => (
                      <tr key={d.name}>
                        <td className="font-medium">{d.name}</td>
                        <td><span className="badge badge-sm">{d.count}</span></td>
                        <td>{formatCurrency(d.avg_salary)}</td>
                        <td>{formatCurrency(d.total_salary)}</td>
                        <td>{formatCurrency(d.budget)}</td>
                        <td>
                          <div className="flex items-center gap-2">
                            <progress className="progress progress-primary w-20" value={d.budget > 0 ? (d.total_salary / d.budget) * 100 : 0} max={100} />
                            <span className="text-xs">{d.budget > 0 ? Math.round((d.total_salary / d.budget) * 100) : 0}%</span>
                          </div>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>

            <div className="pro-card p-4">
              <h3 className="font-semibold text-sm flex items-center gap-2 mb-3">
                <TrendingUp size={15} className="text-primary" /> Headcount Trend (6 Months)
              </h3>
              <div className="flex items-end gap-2 h-32">
                {headcount.map(h => (
                  <div key={h.month} className="flex-1 flex flex-col items-center gap-1">
                    <span className="text-xs font-medium">{h.count}</span>
                    <div className="w-full bg-primary rounded-t" style={{ height: `${(h.count / maxBar(headcount.map(x => x.count))) * 100}%`, minHeight: '4px' }} />
                    <span className="text-[10px] text-base-content/50">{h.month.slice(5)}</span>
                  </div>
                ))}
              </div>
            </div>
          </div>
        )}

        {tab === 'payroll' && (
          <div className="space-y-4">
            <div className="pro-card p-4">
              <h3 className="font-semibold text-sm flex items-center gap-2 mb-3">
                <Wallet size={15} className="text-primary" /> Payroll by Month
              </h3>
              <div className="overflow-x-auto">
                <table className="table table-sm">
                  <thead><tr><th>Month</th><th>Employees</th><th>Basic</th><th>Allowances</th><th>Deductions</th><th>Net Payroll</th></tr></thead>
                  <tbody>
                    {payrollData.map(p => (
                      <tr key={p.month}>
                        <td className="font-medium">{p.month}</td>
                        <td>{p.emp_count}</td>
                        <td>{formatCurrency(p.total_basic)}</td>
                        <td className="text-success">{formatCurrency(p.total_allowances)}</td>
                        <td className="text-error">{formatCurrency(p.total_deductions)}</td>
                        <td className="font-bold">{formatCurrency(p.total_net)}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>

            <div className="pro-card p-4">
              <h3 className="font-semibold text-sm flex items-center gap-2 mb-3">
                <BarChart3 size={15} className="text-primary" /> Payroll Distribution
              </h3>
              <div className="flex items-end gap-2 h-32">
                {payrollData.slice().reverse().map(p => (

                    <span className="text-[10px] text-base-content/50">{p.month.slice(5)}</span>

                ))}

            </div>
          </div>
        )}

        {tab === 'leave' && (
          <div className="pro-card p-4">

        {tab === 'attendance' && (

const CATEGORIES = ['technical', 'soft_skills', 'compliance', 'leadership', 'onboarding'] as const;
const STATUSES = ['upcoming', 'in_progress', 'completed', 'cancelled'] as const;
const CATEGORY_COLORS: Record<string, string> = { technical: 'badge-info', soft_skills: 'badge-secondary', compliance: 'badge-warning', leadership: 'badge-primary', onboarding: 'badge-success' };
const STATUS_COLORS: Record<string, string> = { upcoming: 'badge-info', in_progress: 'badge-warning', completed: 'badge-success', cancelled: 'badge-error' };

const Training: React.FC = () => {
  const [programs, setPrograms] = useState<TrainingProgram[]>([]);
  const [employees, setEmployees] = useState<Employee[]>([]);
  const [search, setSearch] = useState('');
  const [filterCat, setFilterCat] = useState('all');
  const [filterStatus, setFilterStatus] = useState('all');
  const [modal, setModal] = useState<ModalState>({ type: 'none' });
  const [enrollments, setEnrollments] = useState<TrainingEnrollment[]>([]);
  const [viewProgram, setViewProgram] = useState<TrainingProgram | null>(null);
  const [enrollModal, setEnrollModal] = useState(false);
  const [enrollEmpId, setEnrollEmpId] = useState('');

  const loadPrograms = async () => {
    const rows = await window.tasklet.sqlQuery(`
      SELECT tp.*, d.name as department_name,
        (SELECT COUNT(*) FROM hr_training_enrollments te WHERE te.program_id = tp.id) as enrolled_count
      FROM hr_training_programs tp
      LEFT JOIN hr_departments d ON d.id = tp.department_id
      ORDER BY tp.start_date DESC
    `);
    setPrograms(rows as unknown as TrainingProgram[]);
  };

  const loadEmployees = async () => {
    const rows = await window.tasklet.sqlQuery(`SELECT * FROM hr_employees WHERE status='active' ORDER BY first_name`);
    setEmployees(rows as unknown as Employee[]);
  };

  const loadEnrollments = async (programId: number) => {
    const rows = await window.tasklet.sqlQuery(`
      SELECT te.*, e.first_name || ' ' || e.last_name as employee_name
      FROM hr_training_enrollments te
      JOIN hr_employees e ON e.id = te.employee_id
      WHERE te.program_id = ${programId}
    `);
    setEnrollments(rows as unknown as TrainingEnrollment[]);
  };

  useEffect(() => { loadPrograms(); loadEmployees(); }, []);

  const filtered = programs.filter(p => {
    if (search && !p.title.toLowerCase().includes(search.toLowerCase()) && !p.trainer.toLowerCase().includes(search.toLowerCase())) return false;
    if (filterCat !== 'all' && p.category !== filterCat) return false;
    if (filterStatus !== 'all' && p.status !== filterStatus) return false;
    return true;
  });

  const handleSave = async (e: React.FormEvent<HTMLFormElement>) => {
    e.preventDefault();
    const fd = new FormData(e.currentTarget);
    const title = escapeSql(fd.get('title') as string);
    const description = escapeSql(fd.get('description') as string);
    const trainer = escapeSql(fd.get('trainer') as string);
    const deptId = fd.get('department_id') as string;
    const startDate = fd.get('start_date') as string;
    const endDate = fd.get('end_date') as string;
    const maxP = fd.get('max_participants') as string;
    const category = fd.get('category') as string;
    const status = fd.get('status') as string;

    if (modal.type === 'add') {
      await window.tasklet.sqlExec(`INSERT INTO hr_training_programs (title, description, trainer, department_id, start_date, end_date, max_participants, category, status) VALUES ('${title}', '${description}', '${trainer}', ${deptId || 'NULL'}, '${startDate}', '${endDate}', ${maxP}, '${category}', '${status}')`);
    } else if (modal.type === 'edit' && modal.data) {
      await window.tasklet.sqlExec(`UPDATE hr_training_programs SET title='${title}', description='${description}', trainer='${trainer}', department_id=${deptId || 'NULL'}, start_date='${startDate}', end_date='${endDate}', max_participants=${maxP}, category='${category}', status='${status}' WHERE id=${modal.data.id}`);
    }
    setModal({ type: 'none' });
    loadPrograms();
  };

  const handleDelete = async (id: number) => {
    await window.tasklet.sqlExec(`DELETE FROM hr_training_enrollments WHERE program_id=${id}`);
    await window.tasklet.sqlExec(`DELETE FROM hr_training_programs WHERE id=${id}`);
    loadPrograms();
  };

  const handleEnroll = async (programId: number) => {
    if (!enrollEmpId) return;
    await window.tasklet.sqlExec(`INSERT INTO hr_training_enrollments (program_id, employee_id) VALUES (${programId}, ${enrollEmpId})`);
    setEnrollEmpId('');
    setEnrollModal(false);
    loadEnrollments(programId);
    loadPrograms();
  };

  const handleCompleteEnrollment = async (enrollId: number, programId: number) => {
    const today = new Date().toISOString().slice(0, 10);
    const score = Math.floor(Math.random() * 30) + 70;
    await window.tasklet.sqlExec(`UPDATE hr_training_enrollments SET status='completed', completion_date='${today}', score=${score} WHERE id=${enrollId}`);
    loadEnrollments(programId);
    loadPrograms();
  };

  const handleRemoveEnrollment = async (enrollId: number, programId: number) => {
    await window.tasklet.sqlExec(`DELETE FROM hr_training_enrollments WHERE id=${enrollId}`);
    loadEnrollments(programId);
    loadPrograms();
  };

  const openView = (p: TrainingProgram) => {
    setViewProgram(p);
    loadEnrollments(p.id);
  };

  const departments = [...new Set(programs.map(p => p.department_name).filter(Boolean))];

  return (
    <div className="h-full flex flex-col overflow-hidden">
      <div className="p-4 pb-2 flex flex-col sm:flex-row sm:items-center justify-between gap-3">
        <div className="page-header">
          <div className="page-header-icon bg-primary/10 text-primary">
            <GraduationCap size={18} />
          </div>
          <div>
            <h2 className="text-lg font-bold tracking-tight">Training & Development</h2>
            <p className="text-xs text-base-content/40">Programs & employee development</p>
          </div>
        </div>
        <button className="btn btn-primary btn-sm w-full sm:w-auto" onClick={() => setModal({ type: 'add' })}><Plus size={14} /> New Program</button>
      </div>

      <div className="px-4 pb-2 flex flex-col sm:flex-row gap-2 flex-wrap">
        <label className="input input-bordered input-sm flex items-center gap-2 w-full sm:w-64">
          <Search className="h-[1em] opacity-50" />
          <input type="search" className="grow" placeholder="Search programs..." value={search} onChange={e => setSearch(e.target.value)} />
        </label>
        <select className="select select-bordered select-sm" value={filterCat} onChange={e => setFilterCat(e.target.value)}>
          <option value="all">All Categories</option>
          {CATEGORIES.map(c => <option key={c} value={c}>{c.replace('_', ' ')}</option>)}
        </select>
        <select className="select select-bordered select-sm" value={filterStatus} onChange={e => setFilterStatus(e.target.value)}>
          <option value="all">All Statuses</option>
          {STATUSES.map(s => <option key={s} value={s}>{s.replace('_', ' ')}</option>)}
        </select>
      </div>

      {/* Program list or detail view */}
      <div className="flex-1 overflow-y-auto px-4 pb-4">
        {viewProgram ? (
          <div className="space-y-3">
            <button className="btn btn-ghost btn-sm" onClick={() => setViewProgram(null)}>← Back to programs</button>
            <div className="pro-card p-4">
              <div className="flex justify-between items-start">
                <div>
                  <h2 className="text-lg font-bold">{viewProgram.title}</h2>
                  <p className="text-sm text-base-content/60 mt-1">{viewProgram.description}</p>
                </div>
                <div className="flex gap-1">
                  <span className={`badge ${CATEGORY_COLORS[viewProgram.category] || 'badge-ghost'} badge-sm`}>{viewProgram.category.replace('_', ' ')}</span>
                  <span className={`badge ${STATUS_COLORS[viewProgram.status] || 'badge-ghost'} badge-sm`}>{viewProgram.status.replace('_', ' ')}</span>
                </div>
              </div>
              <div className="grid grid-cols-2 sm:grid-cols-4 gap-3 mt-3 text-sm">
                <div><span className="text-base-content/50">Trainer:</span> {viewProgram.trainer}</div>
                <div><span className="text-base-content/50">Department:</span> {viewProgram.department_name || 'All'}</div>
                <div><span className="text-base-content/50">Dates:</span> {formatDate(viewProgram.start_date)} – {formatDate(viewProgram.end_date)}</div>
                <div><span className="text-base-content/50">Capacity:</span> {viewProgram.enrolled_count || 0}/{viewProgram.max_participants}</div>
              </div>
            </div>

            <div className="pro-card p-4">
              <div className="flex items-center justify-between mb-3">
                <h3 className="font-semibold text-sm flex items-center gap-2">
                  <Users size={15} className="text-primary" />
                  Enrolled Participants ({enrollments.length})
                </h3>
                {viewProgram.status !== 'completed' && viewProgram.status !== 'cancelled' && (
                  <button className="btn btn-primary btn-xs" onClick={() => setEnrollModal(true)}><UserPlus size={12} /> Enroll</button>
                )}
              </div>

              {enrollModal && (
                <div className="flex gap-2 mb-3">
                  <select className="select select-bordered select-xs flex-1" value={enrollEmpId} onChange={e => setEnrollEmpId(e.target.value)}>
                    <option value="">Select employee...</option>
                    {employees.filter(emp => !enrollments.some(en => en.employee_id === emp.id)).map(emp => (
                      <option key={emp.id} value={emp.id}>{emp.first_name} {emp.last_name}</option>
                    ))}
                  </select>
                  <button className="btn btn-success btn-xs" onClick={() => handleEnroll(viewProgram.id)}>Add</button>
                  <button className="btn btn-ghost btn-xs" onClick={() => setEnrollModal(false)}><X size={12} /></button>
                </div>
              )}

              {enrollments.length === 0 ? (
                <div className="text-center py-10">
                  <Users size={36} className="mx-auto text-base-content/15 mb-2" />
                  <p className="text-sm text-base-content/40 font-medium">No participants enrolled yet</p>
                  <p className="text-xs text-base-content/30 mt-1">Use the Enroll button to add employees</p>
                </div>
              ) : (
                <div className="overflow-x-auto">
                  <table className="table table-sm">
                    <thead><tr><th>Name</th><th>Status</th><th>Completed</th><th>Score</th><th>Actions</th></tr></thead>
                    <tbody>
                      {enrollments.map(en => (
                        <tr key={en.id}>
                          <td>{en.employee_name}</td>
                          <td><span className={`badge badge-xs ${en.status === 'completed' ? 'badge-success' : en.status === 'dropped' ? 'badge-error' : 'badge-info'}`}>{en.status}</span></td>
                          <td>{en.completion_date ? formatDate(en.completion_date) : '—'}</td>
                          <td>{en.score > 0 ? `${en.score}%` : '—'}</td>
                          <td className="flex gap-1">
                            {en.status === 'enrolled' && (
                              <>
                                <button className="btn btn-success btn-xs" onClick={() => handleCompleteEnrollment(en.id, viewProgram.id)}><CheckCircle size={11} /></button>
                                <button className="btn btn-error btn-xs" onClick={() => handleRemoveEnrollment(en.id, viewProgram.id)}><X size={11} /></button>
                              </>
                            )}
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              )}
            </div>
          </div>
        ) : (
          <>
            {filtered.length === 0 ? (
              <div className="text-center py-10">
                <GraduationCap size={36} className="mx-auto text-base-content/15 mb-2" />
                <p className="text-sm text-base-content/40 font-medium">No programs found</p>
                <p className="text-xs text-base-content/30 mt-1">Try adjusting your search or filters</p>
              </div>
            ) : (
              <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                {filtered.map(p => (
                  <div key={p.id} className="pro-card p-4">
                    <div className="flex justify-between items-start mb-2">
                      <div className="flex-1 min-w-0">
                        <h3 className="font-semibold text-sm truncate">{p.title}</h3>
                        <p className="text-xs text-base-content/50 mt-0.5">{p.trainer}</p>
                      </div>
                      <span className={`badge ${STATUS_COLORS[p.status] || 'badge-ghost'} badge-xs ml-2`}>{p.status.replace('_', ' ')}</span>
                    </div>
                    <p className="text-xs text-base-content/60 line-clamp-2 mb-2">{p.description}</p>
                    <div className="flex items-center gap-3 text-xs text-base-content/50 mb-3">
                      <span className="flex items-center gap-1"><Calendar size={11} /> {formatDate(p.start_date)}</span>
                      <span className="flex items-center gap-1"><Users size={11} /> {p.enrolled_count || 0}/{p.max_participants}</span>
                      <span className={`badge ${CATEGORY_COLORS[p.category] || 'badge-ghost'} badge-xs`}>{p.category.replace('_', ' ')}</span>
                    </div>
                    <div className="flex gap-1">
                      <button className="btn btn-ghost btn-xs" onClick={() => openView(p)}><Eye size={12} /> View</button>
                      <button className="btn btn-ghost btn-xs" onClick={() => setModal({ type: 'edit', data: p as unknown as Record<string, unknown> })}>Edit</button>
                      <button className="btn btn-ghost btn-xs text-error" onClick={() => handleDelete(p.id)}>Delete</button>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </>
        )}
      </div>

      {/* Add/Edit Modal */}
      {(modal.type === 'add' || modal.type === 'edit') && (
        <div className="modal modal-open">
          <div className="modal-box max-w-lg">
            <h3 className="font-bold text-lg flex items-center gap-2">
              <BookOpen size={18} className="text-primary" /> {modal.type === 'add' ? 'New' : 'Edit'} Training Program
            </h3>
            <form onSubmit={handleSave} className="space-y-3 mt-3">
              <input name="title" className="input input-bordered w-full input-sm" placeholder="Program title" defaultValue={(modal.data?.title as string) || ''} required />
              <textarea name="description" className="textarea textarea-bordered w-full textarea-sm" placeholder="Description" defaultValue={(modal.data?.description as string) || ''} />
              <div className="grid grid-cols-2 gap-3">
                <input name="trainer" className="input input-bordered input-sm" placeholder="Trainer" defaultValue={(modal.data?.trainer as string) || ''} required />
                <select name="department_id" className="select select-bordered select-sm" defaultValue={(modal.data?.department_id as string) || ''}>
                  <option value="">All departments</option>
                  {employees.length > 0 && [...new Map(employees.map(e => [e.department_id, e.department_name])).entries()].map(([id, name]) => (
                    <option key={id} value={id}>{name}</option>
                  ))}
                </select>
              </div>
              <div className="grid grid-cols-2 gap-3">
                <input name="start_date" type="date" className="input input-bordered input-sm" defaultValue={(modal.data?.start_date as string) || ''} required />
                <input name="end_date" type="date" className="input input-bordered input-sm" defaultValue={(modal.data?.end_date as string) || ''} required />
              </div>
              <div className="grid grid-cols-1 sm:grid-cols-3 gap-3">
                <input name="max_participants" type="number" className="input input-bordered input-sm" placeholder="Max participants" defaultValue={(modal.data?.max_participants as number) || 20} />
                <select name="category" className="select select-bordered select-sm" defaultValue={(modal.data?.category as string) || 'technical'}>
                  {CATEGORIES.map(c => <option key={c} value={c}>{c.replace('_', ' ')}</option>)}
                </select>
                <select name="status" className="select select-bordered select-sm" defaultValue={(modal.data?.status as string) || 'upcoming'}>
                  {STATUSES.map(s => <option key={s} value={s}>{s.replace('_', ' ')}</option>)}
                </select>
              </div>
              <div className="modal-action">
                <button type="button" className="btn btn-ghost btn-sm" onClick={() => setModal({ type: 'none' })}>Cancel</button>
                <button type="submit" className="btn btn-primary btn-sm">Save</button>
              </div>
            </form>
          </div>
          <div className="modal-backdrop" onClick={() => setModal({ type: 'none' })} />
        </div>
      )}
    </div>
  );
};


// ════════════════════ TalentAcquisition.tsx ════════════════════

const EMP_TYPES = ['full_time', 'part_time', 'contract', 'internship'] as const;
const JOB_STATUSES = ['open', 'closed', 'on_hold'] as const;
const CANDIDATE_STATUSES = ['applied', 'screening', 'interview', 'offered', 'hired', 'rejected'] as const;
const CAND_COLORS: Record<string, string> = { applied: 'badge-info', screening: 'badge-warning', interview: 'badge-primary', offered: 'badge-secondary', hired: 'badge-success', rejected: 'badge-error' };
const JOB_COLORS: Record<string, string> = { open: 'badge-success', closed: 'badge-error', on_hold: 'badge-warning' };

type ViewMode = 'jobs' | 'candidates' | 'pipeline';

const TalentAcquisition: React.FC = () => {
  const [jobs, setJobs] = useState<JobOpening[]>([]);
  const [candidates, setCandidates] = useState<Candidate[]>([]);
  const [view, setView] = useState<ViewMode>('jobs');
  const [search, setSearch] = useState('');
  const [filterJobStatus, setFilterJobStatus] = useState('all');
  const [filterCandStatus, setFilterCandStatus] = useState('all');
  const [jobModal, setJobModal] = useState<ModalState>({ type: 'none' });
  const [candModal, setCandModal] = useState<ModalState>({ type: 'none' });
  const [selectedJob, setSelectedJob] = useState<JobOpening | null>(null);
  const [departments, setDepartments] = useState<{ id: number; name: string }[]>([]);

  const loadJobs = async () => {
    const rows = await window.tasklet.sqlQuery(`
      SELECT j.*, d.name as department_name
      FROM hr_job_openings j
      LEFT JOIN hr_departments d ON d.id = j.department_id
      ORDER BY j.posted_date DESC
    `);
    setJobs(rows as unknown as JobOpening[]);
  };

  const loadCandidates = async () => {
    const rows = await window.tasklet.sqlQuery(`
      SELECT c.*, j.title as job_title
      FROM hr_candidates c
      JOIN hr_job_openings j ON j.id = c.job_id
      ORDER BY c.applied_date DESC
    `);
    setCandidates(rows as unknown as Candidate[]);
  };

  const loadDepts = async () => {
    const rows = await window.tasklet.sqlQuery(`SELECT id, name FROM hr_departments ORDER BY name`);
    setDepartments(rows as unknown as { id: number; name: string }[]);
  };

  useEffect(() => { loadJobs(); loadCandidates(); loadDepts(); }, []);

  // Filtered lists
  const filteredJobs = jobs.filter(j => {
    if (search && !j.title.toLowerCase().includes(search.toLowerCase())) return false;
    if (filterJobStatus !== 'all' && j.status !== filterJobStatus) return false;
    return true;
  });

  const filteredCandidates = candidates.filter(c => {
    const s = search.toLowerCase();
    if (search && !c.first_name.toLowerCase().includes(s) && !c.last_name.toLowerCase().includes(s) && !(c.job_title || '').toLowerCase().includes(s)) return false;
    if (filterCandStatus !== 'all' && c.status !== filterCandStatus) return false;
    if (selectedJob && c.job_id !== selectedJob.id) return false;
    return true;
  });

  // Pipeline view
  const pipelineCols = CANDIDATE_STATUSES.filter(s => s !== 'rejected');
  const getCandsByStatus = (status: string) => candidates.filter(c => c.status === status && (!selectedJob || c.job_id === selectedJob.id));

  const handleSaveJob = async (e: React.FormEvent<HTMLFormElement>) => {
    e.preventDefault();
    const fd = new FormData(e.currentTarget);
    const title = escapeSql(fd.get('title') as string);
    const deptId = fd.get('department_id') as string;
    const description = escapeSql(fd.get('description') as string);
    const requirements = escapeSql(fd.get('requirements') as string);
    const salaryMin = fd.get('salary_min') as string;
    const salaryMax = fd.get('salary_max') as string;
    const empType = fd.get('employment_type') as string;
    const status = fd.get('status') as string;
    const postedDate = fd.get('posted_date') as string;
    const closingDate = fd.get('closing_date') as string;

    if (jobModal.type === 'add') {
      await window.tasklet.sqlExec(`INSERT INTO hr_job_openings (title, department_id, description, requirements, salary_min, salary_max, employment_type, status, posted_date, closing_date) VALUES ('${title}', ${deptId}, '${description}', '${requirements}', ${salaryMin}, ${salaryMax}, '${empType}', '${status}', '${postedDate}', '${closingDate}')`);
    } else if (jobModal.type === 'edit' && jobModal.data) {
      await window.tasklet.sqlExec(`UPDATE hr_job_openings SET title='${title}', department_id=${deptId}, description='${description}', requirements='${requirements}', salary_min=${salaryMin}, salary_max=${salaryMax}, employment_type='${empType}', status='${status}', posted_date='${postedDate}', closing_date='${closingDate}' WHERE id=${jobModal.data.id}`);
    }
    setJobModal({ type: 'none' });
    loadJobs();
  };

  const handleSaveCand = async (e: React.FormEvent<HTMLFormElement>) => {
    e.preventDefault();
    const fd = new FormData(e.currentTarget);
    const firstName = escapeSql(fd.get('first_name') as string);
    const lastName = escapeSql(fd.get('last_name') as string);
    const email = escapeSql(fd.get('email') as string);
    const phone = escapeSql(fd.get('phone') as string);
    const jobId = fd.get('job_id') as string;
    const exp = fd.get('experience_years') as string;
    const status = fd.get('status') as string;
    const notes = escapeSql(fd.get('notes') as string);
    const appliedDate = fd.get('applied_date') as string;

    if (candModal.type === 'add') {
      await window.tasklet.sqlExec(`INSERT INTO hr_candidates (job_id, first_name, last_name, email, phone, experience_years, status, notes, applied_date) VALUES (${jobId}, '${firstName}', '${lastName}', '${email}', '${phone}', ${exp}, '${status}', '${notes}', '${appliedDate}')`);
    } else if (candModal.type === 'edit' && candModal.data) {
      await window.tasklet.sqlExec(`UPDATE hr_candidates SET job_id=${jobId}, first_name='${firstName}', last_name='${lastName}', email='${email}', phone='${phone}', experience_years=${exp}, status='${status}', notes='${notes}', applied_date='${appliedDate}' WHERE id=${candModal.data.id}`);
    }
    setCandModal({ type: 'none' });
    loadCandidates();
  };

  const handleDeleteJob = async (id: number) => {
    await window.tasklet.sqlExec(`DELETE FROM hr_candidates WHERE job_id=${id}`);
    await window.tasklet.sqlExec(`DELETE FROM hr_job_openings WHERE id=${id}`);
    loadJobs();
    loadCandidates();
  };

  const handleDeleteCand = async (id: number) => {
    await window.tasklet.sqlExec(`DELETE FROM hr_candidates WHERE id=${id}`);
    loadCandidates();
  };

  const updateCandStatus = async (id: number, status: string) => {
    await window.tasklet.sqlExec(`UPDATE hr_candidates SET status='${status}' WHERE id=${id}`);
    loadCandidates();
  };

  const openJobs = jobs.filter(j => j.status === 'open').length;
  const totalCands = candidates.length;
  const hiredCount = candidates.filter(c => c.status === 'hired').length;

  return (
    <div className="h-full flex flex-col overflow-hidden">
      <div className="p-4 pb-2 flex flex-col sm:flex-row sm:items-center justify-between gap-3">
        <div className="page-header">
          <div className="page-header-icon bg-primary/10 text-primary">
            <UserPlus size={18} />
          </div>
          <div>
            <h2 className="text-lg font-bold tracking-tight">Talent Acquisition</h2>
            <p className="text-xs text-base-content/40">Recruitment & hiring pipeline</p>
          </div>
        </div>
        <div className="flex gap-2 w-full sm:w-auto">
          <button className="btn btn-primary btn-sm flex-1 sm:flex-none" onClick={() => setJobModal({ type: 'add' })}><Plus size={14} /> New Job</button>
          <button className="btn btn-outline btn-sm flex-1 sm:flex-none" onClick={() => setCandModal({ type: 'add' })}><Plus size={14} /> Add Candidate</button>
        </div>
      </div>

      {/* Stats */}
      <div className="px-4 grid grid-cols-2 sm:grid-cols-4 gap-3 mb-3">
        <div className="stat-card p-3 sm:p-4">
          <p className="text-[11px] font-semibold text-base-content/45 uppercase tracking-wide">Open Positions</p>
          <p className="text-xl font-bold mt-1">{openJobs}</p>
        </div>
        <div className="stat-card stat-info p-3 sm:p-4">
          <p className="text-[11px] font-semibold text-base-content/45 uppercase tracking-wide">Total Candidates</p>
          <p className="text-xl font-bold mt-1">{totalCands}</p>
        </div>
        <div className="stat-card stat-warning p-3 sm:p-4">
          <p className="text-[11px] font-semibold text-base-content/45 uppercase tracking-wide">In Pipeline</p>
          <p className="text-xl font-bold mt-1">{candidates.filter(c => !['hired', 'rejected'].includes(c.status)).length}</p>
        </div>
        <div className="stat-card stat-success p-3 sm:p-4">
          <p className="text-[11px] font-semibold text-base-content/45 uppercase tracking-wide">Hired</p>
          <p className="text-xl font-bold mt-1">{hiredCount}</p>
        </div>
      </div>

      {/* View tabs + filters */}
      <div className="px-4 pb-2 flex flex-col sm:flex-row gap-2 flex-wrap items-stretch sm:items-center">
        <div className="tabs tabs-bordered overflow-x-auto">
          <button className={`tab tab-sm ${view === 'jobs' ? 'tab-active' : ''}`} onClick={() => { setView('jobs'); setSelectedJob(null); }}>Job Openings</button>
          <button className={`tab tab-sm ${view === 'candidates' ? 'tab-active' : ''}`} onClick={() => setView('candidates')}>Candidates</button>
          <button className={`tab tab-sm ${view === 'pipeline' ? 'tab-active' : ''}`} onClick={() => setView('pipeline')}>Pipeline</button>
        </div>
        <label className="input input-bordered input-sm flex items-center gap-2 w-full sm:w-64 sm:ml-auto">
          <Search className="h-[1em] opacity-50" />
          <input type="search" className="grow" placeholder="Search..." value={search} onChange={e => setSearch(e.target.value)} />
        </label>
        {view === 'jobs' && (
          <select className="select select-bordered select-sm" value={filterJobStatus} onChange={e => setFilterJobStatus(e.target.value)}>
            <option value="all">All Status</option>
            {JOB_STATUSES.map(s => <option key={s} value={s}>{s.replace('_', ' ')}</option>)}
          </select>
        )}
        {view === 'candidates' && (
          <select className="select select-bordered select-sm" value={filterCandStatus} onChange={e => setFilterCandStatus(e.target.value)}>
            <option value="all">All Status</option>
            {CANDIDATE_STATUSES.map(s => <option key={s} value={s}>{s}</option>)}
          </select>
        )}
      </div>

      <div className="flex-1 overflow-y-auto px-4 pb-4">
        {/* JOBS VIEW */}
        {view === 'jobs' && (
          <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
            {filteredJobs.map(j => {
              const candCount = candidates.filter(c => c.job_id === j.id).length;
              return (

type View = 'cycles' | 'cycle_detail' | 'appraisal_detail';

const sql = window.tasklet.sqlQuery;
const exec = window.tasklet.sqlExec;

const RATING_LABELS: Record<string, string> = { '5': 'Outstanding', '4': 'Exceeds Expectations', '3': 'Meets Expectations', '2': 'Needs Improvement', '1': 'Unsatisfactory' };
const STATUS_BADGE: Record<string, string> = { pending: 'badge-warning', self_review: 'badge-info', manager_review: 'badge-secondary', completed: 'badge-success', draft: 'badge-ghost', active: 'badge-info', cancelled: 'badge-error' };
const CYCLE_TYPE_LABEL: Record<string, string> = { annual: 'Annual', mid_year: 'Mid-Year', quarterly: 'Quarterly', probation: 'Probation' };

function ratingColor(r: number): string {
  if (r >= 4.5) return 'text-success';
  if (r >= 3.5) return 'text-info';
  if (r >= 2.5) return 'text-warning';
  return 'text-error';
}

function StarRating({ rating, size = 16 }: { rating: number; size?: number }) {
  const full = Math.floor(rating);
  const hasHalf = rating - full >= 0.3;
  return (
    <div className="flex items-center gap-0.5">
      {[1,2,3,4,5].map(i => (
        <Star key={i} size={size} className={i <= full ? 'text-warning fill-warning' : (i === full + 1 && hasHalf) ? 'text-warning fill-warning/40' : 'text-base-content/20'} />
      ))}
    </div>
  );
}

const Appraisals: React.FC = () => {
  const [view, setView] = useState<View>('cycles');
  const [cycles, setCycles] = useState<AppraisalCycle[]>([]);
  const [appraisals, setAppraisals] = useState<Appraisal[]>([]);
  const [employees, setEmployees] = useState<Employee[]>([]);
  const [selectedCycle, setSelectedCycle] = useState<AppraisalCycle | null>(null);
  const [selectedAppraisal, setSelectedAppraisal] = useState<Appraisal | null>(null);
  const [search, setSearch] = useState('');
  const [statusFilter, setStatusFilter] = useState('all');
  const [loading, setLoading] = useState(true);
  const [showCycleModal, setShowCycleModal] = useState(false);
  const [showAppraisalModal, setShowAppraisalModal] = useState(false);
  const [editMode, setEditMode] = useState(false);

  // Cycle form
  const [cycleForm, setCycleForm] = useState({ name: '', cycle_type: 'quarterly', start_date: '', end_date: '', status: 'draft' });
  const [editCycleId, setEditCycleId] = useState<number | null>(null);

  // Appraisal form
  const [appraisalForm, setAppraisalForm] = useState({ employee_id: 0, reviewer_id: 0 });

  // Edit appraisal fields
  const [editFields, setEditFields] = useState({ self_rating: 0, manager_rating: 0, final_rating: 0, self_comments: '', manager_comments: '', strengths: '', improvements: '', goals: '', status: 'pending' });

  useEffect(() => { loadCycles(); loadEmployees(); }, []);

  async function loadCycles() {
    setLoading(true);
    const rows = await sql('SELECT * FROM hr_appraisal_cycles ORDER BY start_date DESC');
    setCycles(rows as unknown as AppraisalCycle[]);
    setLoading(false);
  }

  async function loadEmployees() {
    const rows = await sql("SELECT id, first_name, last_name, department_id, designation FROM hr_employees WHERE status = 'active' ORDER BY first_name");
    setEmployees(rows as unknown as Employee[]);
  }

  async function loadAppraisals(cycleId: number) {
    const rows = await sql(`SELECT a.*, e.first_name || ' ' || e.last_name as employee_name, d.name as department_name, r.first_name || ' ' || r.last_name as reviewer_name FROM hr_appraisals a JOIN hr_employees e ON a.employee_id = e.id JOIN hr_departments d ON e.department_id = d.id JOIN hr_employees r ON a.reviewer_id = r.id WHERE a.cycle_id = ${cycleId} ORDER BY a.status, e.first_name`);
    setAppraisals(rows as unknown as Appraisal[]);
  }

  async function saveCycle() {
    const f = cycleForm;
    if (!f.name || !f.start_date || !f.end_date) return;
    const esc = (s: string) => s.replace(/'/g, "''");
    if (editCycleId) {
      await exec(`UPDATE hr_appraisal_cycles SET name='${esc(f.name)}', cycle_type='${f.cycle_type}', start_date='${f.start_date}', end_date='${f.end_date}', status='${f.status}' WHERE id=${editCycleId}`);
    } else {
      await exec(`INSERT INTO hr_appraisal_cycles (name, cycle_type, start_date, end_date, status) VALUES ('${esc(f.name)}', '${f.cycle_type}', '${f.start_date}', '${f.end_date}', '${f.status}')`);
    }
    setShowCycleModal(false);
    setEditCycleId(null);
    setCycleForm({ name: '', cycle_type: 'quarterly', start_date: '', end_date: '', status: 'draft' });
    loadCycles();
    if (selectedCycle && editCycleId === selectedCycle.id) {
      const updated = await sql(`SELECT * FROM hr_appraisal_cycles WHERE id=${editCycleId}`);
      if (updated.length) setSelectedCycle(updated[0] as unknown as AppraisalCycle);
    }
  }

  async function addAppraisal() {
    if (!selectedCycle || !appraisalForm.employee_id || !appraisalForm.reviewer_id) return;
    await exec(`INSERT INTO hr_appraisals (cycle_id, employee_id, reviewer_id) VALUES (${selectedCycle.id}, ${appraisalForm.employee_id}, ${appraisalForm.reviewer_id})`);
    setShowAppraisalModal(false);
    setAppraisalForm({ employee_id: 0, reviewer_id: 0 });
    loadAppraisals(selectedCycle.id);
  }

  async function saveAppraisalEdit() {
    if (!selectedAppraisal) return;
    const f = editFields;
    const esc = (s: string) => s.replace(/'/g, "''");
    await exec(`UPDATE hr_appraisals SET self_rating=${f.self_rating}, manager_rating=${f.manager_rating}, final_rating=${f.final_rating}, self_comments='${esc(f.self_comments)}', manager_comments='${esc(f.manager_comments)}', strengths='${esc(f.strengths)}', improvements='${esc(f.improvements)}', goals='${esc(f.goals)}', status='${f.status}' WHERE id=${selectedAppraisal.id}`);
    setEditMode(false);
    // Reload
    const rows = await sql(`SELECT a.*, e.first_name || ' ' || e.last_name as employee_name, d.name as department_name, r.first_name || ' ' || r.last_name as reviewer_name FROM hr_appraisals a JOIN hr_employees e ON a.employee_id = e.id JOIN hr_departments d ON e.department_id = d.id JOIN hr_employees r ON a.reviewer_id = r.id WHERE a.id=${selectedAppraisal.id}`);
    if (rows.length) setSelectedAppraisal(rows[0] as unknown as Appraisal);
    if (selectedCycle) loadAppraisals(selectedCycle.id);
  }

  async function deleteAppraisal(id: number) {
    await exec(`DELETE FROM hr_appraisals WHERE id=${id}`);
    if (selectedCycle) loadAppraisals(selectedCycle.id);
    if (selectedAppraisal?.id === id) { setView('cycle_detail'); setSelectedAppraisal(null); }
  }

  function openCycleDetail(cycle: AppraisalCycle) {
    setSelectedCycle(cycle);
    setView('cycle_detail');
    loadAppraisals(cycle.id);
  }

  function openAppraisalDetail(a: Appraisal) {
    setSelectedAppraisal(a);
    setEditFields({ self_rating: a.self_rating, manager_rating: a.manager_rating, final_rating: a.final_rating, self_comments: a.self_comments, manager_comments: a.manager_comments, strengths: a.strengths, improvements: a.improvements, goals: a.goals, status: a.status });
    setEditMode(false);
    setView('appraisal_detail');
  }

  // Stats for a cycle
  const cycleStats = (cid: number) => {
    const ca = appraisals.filter(a => a.cycle_id === cid);
    return { total: ca.length, completed: ca.filter(a => a.status === 'completed').length, pending: ca.filter(a => a.status === 'pending').length, inProgress: ca.filter(a => a.status === 'self_review' || a.status === 'manager_review').length };
  };

  const filteredAppraisals = appraisals.filter(a => {
    if (statusFilter !== 'all' && a.status !== statusFilter) return false;
    if (search && !a.employee_name?.toLowerCase().includes(search.toLowerCase()) && !a.department_name?.toLowerCase().includes(search.toLowerCase())) return false;
    return true;
  });

  // ── CYCLES VIEW ──
  if (view === 'cycles') {
    return (
      <div className="h-full overflow-y-auto p-4 sm:p-6 space-y-5">
        <div className="page-header flex flex-col sm:flex-row sm:items-center justify-between gap-3">
          <div className="flex items-center gap-3">
            <div className="page-header-icon"><ClipboardCheck size={20} className="text-primary" /></div>
            <div>
              <h2 className="text-lg font-bold">Performance Appraisals</h2>
              <p className="text-xs text-base-content/45">Review cycles, ratings & employee performance</p>
            </div>
          </div>
          <button className="btn btn-primary btn-sm gap-2 w-full sm:w-auto" onClick={() => { setEditCycleId(null); setCycleForm({ name: '', cycle_type: 'quarterly', start_date: '', end_date: '', status: 'draft' }); setShowCycleModal(true); }}>
            <Plus size={16} /> New Cycle
          </button>
        </div>

        {/* Summary Stats */}
        <div className="grid grid-cols-2 sm:grid-cols-4 gap-3">
          <div className="stat-card"><p className="text-[11px] font-semibold uppercase tracking-wide text-base-content/45">Total Cycles</p><p className="text-2xl font-bold">{cycles.length}</p></div>
          <div className="stat-card stat-success"><p className="text-[11px] font-semibold uppercase tracking-wide text-base-content/45">Active</p><p className="text-2xl font-bold">{cycles.filter(c => c.status === 'active').length}</p></div>
          <div className="stat-card stat-info"><p className="text-[11px] font-semibold uppercase tracking-wide text-base-content/45">Completed</p><p className="text-2xl font-bold">{cycles.filter(c => c.status === 'completed').length}</p></div>
          <div className="stat-card stat-warning"><p className="text-[11px] font-semibold uppercase tracking-wide text-base-content/45">Draft</p><p className="text-2xl font-bold">{cycles.filter(c => c.status === 'draft').length}</p></div>
        </div>

        {loading ? (
          <div className="flex justify-center py-12"><span className="loading loading-spinner loading-md text-primary" /></div>
        ) : cycles.length === 0 ? (
          <div className="text-center py-16 text-base-content/40">
            <ClipboardCheck size={40} className="mx-auto mb-3 opacity-30" />
            <p className="font-medium">No appraisal cycles yet</p>
            <p className="text-xs mt-1">Create your first review cycle to get started</p>
          </div>
        ) : (
          <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
            {cycles.map(c => (
              <div key={c.id} className="pro-card p-4 cursor-pointer hover:border-primary/30 transition-colors" onClick={() => openCycleDetail(c)}>
                <div className="flex items-start justify-between mb-3">
                  <div>
                    <h3 className="font-semibold text-sm">{c.name}</h3>
                    <p className="text-xs text-base-content/50 mt-0.5">{CYCLE_TYPE_LABEL[c.cycle_type] || c.cycle_type}</p>
                  </div>
                  <span className={`badge badge-sm ${STATUS_BADGE[c.status] || 'badge-ghost'}`}>{c.status.replace('_', ' ')}</span>
                </div>
                <div className="flex items-center gap-2 text-xs text-base-content/50 mb-3">
                  <Calendar size={12} />
                  <span>{c.start_date} — {c.end_date}</span>
                </div>
                <div className="flex items-center gap-4 text-xs">
                  <button className="text-primary hover:underline font-medium" onClick={(e) => { e.stopPropagation(); openCycleDetail(c); }}>View Details →</button>

            ))}

        {/* Cycle Modal */}
        {showCycleModal && (
          <div className="modal modal-open">
            <div className="modal-box max-w-md border border-base-300 border-t-4 border-t-primary">

                  <div><label className="text-xs font-medium mb-1 block">Status</label><select className="select select-bordered select-sm w-full" value={cycleForm.status} onChange={e => setCycleForm({...cycleForm, status: e.target.value})}><option value="draft">Draft</option><option value="active">Active</option><option value="completed">Completed</option><option value="cancelled">Cancelled</option></select></div>

  }

  // ── CYCLE DETAIL VIEW ──
  if (view === 'cycle_detail' && selectedCycle) {

            ) : (

        {/* Rating Overview */}
        <div className="grid grid-cols-1 sm:grid-cols-3 gap-3">
          <div className="pro-card p-4 text-center">

            {editMode ? (

            <p className="text-[10px] font-semibold uppercase tracking-wide text-base-content/45 mb-1">Manager Rating</p>
            {editMode ? (
              <input type="number" min={0} max={5} step={0.1} className="input input-bordered input-sm w-24 text-center mx-auto" value={f.manager_rating} onChange={e => setEditFields({...f, manager_rating: Number(e.target.value)})} />
            ) : (

                  <div className="flex flex-col items-center gap-1">
                    <StarRating rating={a.final_rating} size={14} />

                  </div>

              </>

          </div>
        </div>

        {/* Status */}
        {editMode && (
          <div className="pro-card p-4">
            <label className="text-xs font-semibold mb-1 block">Appraisal Status</label>
            <select className="select select-bordered select-sm w-full sm:w-60" value={f.status} onChange={e => setEditFields({...f, status: e.target.value})}>
              <option value="pending">Pending</option>
              <option value="self_review">Self Review</option>
              <option value="manager_review">Manager Review</option>
              <option value="completed">Completed</option>

          </div>
        )}

        {/* Comments & Feedback */}
        <div className="grid grid-cols-1 lg:grid-cols-2 gap-3">
          <div className="pro-card p-4">
            <h4 className="font-semibold text-sm flex items-center gap-2 mb-3"><MessageSquare size={15} className="text-primary" /> Self Assessment</h4>
            {editMode ? (
              <textarea className="textarea textarea-bordered w-full text-sm h-28" value={f.self_comments} onChange={e => setEditFields({...f, self_comments: e.target.value})} placeholder="Employee's self-assessment..." />
            ) : (
              <p className="text-sm text-base-content/70 whitespace-pre-wrap">{a.self_comments || <span className="text-base-content/30 italic">No self assessment yet</span>}</p>
            )}
          </div>
          <div className="pro-card p-4">
            <h4 className="font-semibold text-sm flex items-center gap-2 mb-3"><MessageSquare size={15} className="text-secondary" /> Manager Feedback</h4>
            {editMode ? (
              <textarea className="textarea textarea-bordered w-full text-sm h-28" value={f.manager_comments} onChange={e => setEditFields({...f, manager_comments: e.target.value})} placeholder="Manager's review comments..." />
            ) : (
              <p className="text-sm text-base-content/70 whitespace-pre-wrap">{a.manager_comments || <span className="text-base-content/30 italic">No manager feedback yet</span>}</p>
            )}
          </div>
        </div>

        <div className="grid grid-cols-1 lg:grid-cols-3 gap-3">
          <div className="pro-card p-4">
            <h4 className="font-semibold text-sm flex items-center gap-2 mb-3"><TrendingUp size={15} className="text-success" /> Strengths</h4>
            {editMode ? (
              <textarea className="textarea textarea-bordered w-full text-sm h-24" value={f.strengths} onChange={e => setEditFields({...f, strengths: e.target.value})} placeholder="Key strengths..." />
            ) : (

                {a.strengths ? a.strengths.split(',').map((s, i) => (
                  <div key={i} className="flex items-center gap-2 text-sm"><CheckCircle size={13} className="text-success shrink-0" /><span className="text-base-content/70">{s.trim()}</span></div>
                )) : <p className="text-sm text-base-content/30 italic">Not specified</p>}

          </div>
          <div className="pro-card p-4">
            <h4 className="font-semibold text-sm flex items-center gap-2 mb-3"><TrendingDown size={15} className="text-warning" /> Areas for Improvement</h4>

              <textarea className="textarea textarea-bordered w-full text-sm h-24" value={f.improvements} onChange={e => setEditFields({...f, improvements: e.target.value})} placeholder="Areas to improve..." />
            ) : (
              <div className="space-y-1.5">
                {a.improvements ? a.improvements.split(',').map((s, i) => (
                  <div key={i} className="flex items-center gap-2 text-sm"><AlertCircle size={13} className="text-warning shrink-0" /><span className="text-base-content/70">{s.trim()}</span></div>
                )) : <p className="text-sm text-base-content/30 italic">Not specified</p>}

            )}
          </div>
          <div className="pro-card p-4">
            <h4 className="font-semibold text-sm flex items-center gap-2 mb-3"><Target size={15} className="text-info" /> Goals</h4>
            {editMode ? (

            ) : (
              <div className="space-y-1.5">
                {a.goals ? a.goals.split(',').map((s, i) => (
                  <div key={i} className="flex items-center gap-2 text-sm"><Target size={13} className="text-info shrink-0" /><span className="text-base-content/70">{s.trim()}</span></div>

              </div>
            )}
          </div>
        </div>
      </div>
    );
  }

  return null;
};


// ════════════════════ Billing.tsx ════════════════════

interface BillingProps {
  currentUser: AppUser;
}

interface DynamicPlan {
  name: string;
  tier: PlanTier;
  price_monthly: number;
  price_annual: number;
  employee_limit: number;
  features: string[];
  highlight?: boolean;
}

const PLAN_FEATURES: Record<PlanTier, { name: string; limit: number; features: string[]; highlight?: boolean }> = {
  free: { name: 'Free', limit: 10, features: ['Up to 10 employees', 'Basic HR management', 'Attendance tracking', 'Leave management', 'Email support'] },
  starter: { name: 'Starter', limit: 25, features: ['Up to 25 employees', 'Everything in Free', 'Payroll processing', 'Basic reports', 'Training module', 'CSV exports', 'Priority email support'] },
  professional: { name: 'Professional', limit: 50, highlight: true, features: ['Up to 50 employees', 'Everything in Starter', 'Advanced analytics', 'Performance appraisals', 'Talent acquisition', 'Audit trail', 'Custom branding', 'Phone & chat support'] },
  enterprise: { name: 'Enterprise', limit: 100, features: ['Up to 100 employees', 'Everything in Professional', 'Multi-tenant management', 'API access', 'Custom integrations', 'WPS compliance', 'Dedicated account manager', '24/7 priority support', 'SLA guarantee'] },
};

const planIcons: Record<PlanTier, React.ReactNode> = {
  free: <Zap size={20} />,
  starter: <Rocket size={20} />,
  professional: <Crown size={20} />,
  enterprise: <Building2 size={20} />,
};

type Tab = 'overview' | 'plans' | 'invoices';

const Billing: React.FC<BillingProps> = ({ currentUser }) => {
  const [tab, setTab] = useState<Tab>('overview');
  const [subscription, setSubscription] = useState<Subscription | null>(null);
  const [invoices, setInvoices] = useState<Invoice[]>([]);
  const [employeeCount, setEmployeeCount] = useState(0);
  const [billingToggle, setBillingToggle] = useState<'monthly' | 'annual'>('annual');
  const [showUpgradeModal, setShowUpgradeModal] = useState(false);
  const [selectedPlan, setSelectedPlan] = useState<PlanTier | null>(null);
  const [loading, setLoading] = useState(true);
  const [plans, setPlans] = useState<DynamicPlan[]>([]);
  const [taxes, setTaxes] = useState<TaxConfig[]>([]);
  const [companyInfo, setCompanyInfo] = useState<Record<string, string>>({});
  const [viewInvoice, setViewInvoice] = useState<Invoice | null>(null);

  useEffect(() => { loadData(); }, []);

  async function loadData() {
    const { sqlQuery } = window.tasklet;
    const currency = getActiveCurrency();
    const [subRows, invRows, empRows, priceRows, taxRows, settingsRows] = await Promise.all([
      sqlQuery('SELECT * FROM hr_subscriptions WHERE tenant_id = 1 ORDER BY id DESC LIMIT 1'),
      sqlQuery('SELECT * FROM hr_invoices WHERE tenant_id = 1 ORDER BY issued_date DESC'),
      sqlQuery("SELECT COUNT(*) as c FROM hr_employees WHERE status = 'active'"),
      sqlQuery(`SELECT * FROM hr_plan_pricing WHERE currency = '${currency}' ORDER BY id`),
      sqlQuery('SELECT * FROM hr_tax_config WHERE enabled = 1'),
      sqlQuery('SELECT key, value FROM hr_company_settings'),
    ]);
    if (subRows.length > 0) setSubscription(subRows[0] as unknown as Subscription);
    setInvoices(invRows as unknown as Invoice[]);
    setEmployeeCount(Number((empRows[0] as Record<string, unknown>).c));
    setTaxes(taxRows as unknown as TaxConfig[]);

    const sMap: Record<string, string> = {};
    (settingsRows as { key: string; value: string }[]).forEach(r => { sMap[r.key] = r.value; });
    setCompanyInfo(sMap);

    // Build dynamic plans from DB pricing
    const pricingArr = priceRows as unknown as PlanPricing[];
    const dynamicPlans: DynamicPlan[] = (['free', 'starter', 'professional', 'enterprise'] as PlanTier[]).map(tier => {
      const meta = PLAN_FEATURES[tier];
      const dbPrice = pricingArr.find(p => p.plan === tier);
      return {
        name: meta.name,
        tier,
        price_monthly: dbPrice?.price_monthly ?? 0,
        price_annual: dbPrice?.price_annual ?? 0,
        employee_limit: meta.limit,
        features: meta.features,
        highlight: meta.highlight,
      };
    });
    setPlans(dynamicPlans);
    setLoading(false);
  }

  const currentPlan = plans.find(p => p.tier === subscription?.plan) || plans[0] || { name: 'Free', tier: 'free' as PlanTier, price_monthly: 0, price_annual: 0, employee_limit: 10, features: [] };
  const usagePercent = Math.round((employeeCount / currentPlan.employee_limit) * 100);

  function getApplicableTax(): TaxConfig | null {
    const currency = getActiveCurrency();
    return taxes.find(t => t.applies_to_currency === currency) || null;
  }

  async function handleUpgrade(tier: PlanTier) {
    const plan = plans.find(p => p.tier === tier);
    if (!plan) return;
    const { sqlExec } = window.tasklet;
    const amount = billingToggle === 'annual' ? plan.price_annual : plan.price_monthly;
    const now = new Date().toISOString().slice(0, 10);
    const end = billingToggle === 'annual'
      ? new Date(Date.now() + 365 * 86400000).toISOString().slice(0, 10)
      : new Date(Date.now() + 30 * 86400000).toISOString().slice(0, 10);

    await sqlExec(`UPDATE hr_subscriptions SET plan='${tier}', status='active', billing_cycle='${billingToggle}', amount=${amount}, current_period_start='${now}', current_period_end='${end}' WHERE tenant_id=1`);
    await sqlExec(`UPDATE hr_tenants SET plan='${tier}', employee_limit=${plan.employee_limit} WHERE id=1`);

    const invNum = `INV-2026-${String(Math.floor(Math.random() * 900) + 100)}`;
    const taxConfig = getApplicableTax();
    const taxRate = taxConfig ? taxConfig.tax_rate : 0;
    const tax = amount * (taxRate / 100);
    await sqlExec(`INSERT INTO hr_invoices (tenant_id, invoice_number, amount, tax, total, status, issued_date, due_date, paid_date) VALUES (1, '${invNum}', ${amount}, ${tax}, ${amount + tax}, 'paid', '${now}', '${now}', '${now}')`);

    await sqlExec(`INSERT INTO hr_audit_log (user_id, action, entity_type, entity_id, details) VALUES (${currentUser.id}, 'upgrade_plan', 'billing', 1, 'Upgraded to ${plan.name} plan (${billingToggle})')`);

    setShowUpgradeModal(false);
    setSelectedPlan(null);
    loadData();
  }

  const tabs: { key: Tab; label: string; icon: React.ReactNode }[] = [
    { key: 'overview', label: 'Overview', icon: <CreditCard size={15} /> },
    { key: 'plans', label: 'Plans & Pricing', icon: <ArrowUpCircle size={15} /> },

  if (loading) return <div className="flex items-center justify-center h-64"><span className="loading loading-dots loading-md text-primary" /></div>;

  const applicableTax = getApplicableTax();

  return (
    <div className="h-full overflow-y-auto">

        {/* Header */}

          <div className="page-header-icon bg-success/15 text-success"><CreditCard size={18} /></div>
          <div>
            <h1 className="text-lg font-bold">Subscription & Billing</h1>
            <p className="text-xs text-base-content/50">Manage your plan, billing cycle, and invoices</p>
          </div>
        </div>

        {/* Tabs */}
        <div className="tabs tabs-boxed bg-base-200 w-fit overflow-x-auto">
          {tabs.map(t => (

        {/* Overview */}
        {tab === 'overview' && (

            <div className="pro-card p-5">

                  <div className={`w-14 h-14 rounded-xl flex items-center justify-center ${currentPlan.tier === 'enterprise' ? 'bg-warning/15 text-warning' : currentPlan.tier === 'professional' ? 'bg-primary/15 text-primary' : currentPlan.tier === 'starter' ? 'bg-info/15 text-info' : 'bg-base-200 text-base-content/50'}`}>

                    <div className="flex items-center gap-2">
