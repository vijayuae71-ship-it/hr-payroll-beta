    // sql.js Database Shim

    let _db = null;
    const DB_KEY = 'hr_payroll_beta_db';

    let _saveTimer = null;
    function _scheduleDbSave() {
      if (_saveTimer) clearTimeout(_saveTimer);
      _saveTimer = setTimeout(() => {
        try {
          const data = _db.export();
          const bytes = new Uint8Array(data);
          const chunks = [];
          const CHUNK = 8192;
          for (let i = 0; i < bytes.length; i += CHUNK) {
            chunks.push(String.fromCharCode.apply(null, bytes.subarray(i, i + CHUNK)));
          }
          localStorage.setItem(DB_KEY, btoa(chunks.join('')));
        } catch(e) { console.warn('DB save failed:', e); }
      }, 200);
    }

    window.tasklet = {
      sqlQuery: function(query) {
        return new Promise((resolve, reject) => {
          try {
            const results = _db.exec(query);
            if (!results.length) { resolve([]); return; }
            const { columns, values } = results[0];
            resolve(values.map(row => {
              const obj = {};
              columns.forEach((col, i) => obj[col] = row[i]);
              return obj;
            }));
          } catch(e) { console.error('SQL Query Error:', query, e); reject(e); }
        });
      },
      sqlExec: function(query) {
        return new Promise((resolve, reject) => {
          try {
            _db.run(query);
            _scheduleDbSave();
            resolve();
          } catch(e) { console.error('SQL Exec Error:', query, e); reject(e); }
        });
      }
    };

    async function _initSqlJs() {
      const SQL = await initSqlJs({
        locateFile: file => 'https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/' + file
      });
      const saved = localStorage.getItem(DB_KEY);
      if (saved) {
        try {
          const binary = atob(saved);
          const bytes = new Uint8Array(binary.length);
          for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
          _db = new SQL.Database(bytes);
          return;
        } catch(e) { console.warn('Fresh DB:', e); }
      }
      _db = new SQL.Database();
    }
